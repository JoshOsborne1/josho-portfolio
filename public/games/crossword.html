<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Crossword - josho.pro</title>
<meta name="description" content="Daily crossword with internet culture, tech, and pop culture clues.">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --border: rgba(255,255,255,0.08);
    --text: #f5f5f7;
    --text-dim: rgba(255,255,255,0.4);
    --accent: #7c3aed;
    --correct: #22c55e;
    --selected: rgba(124,58,237,0.35);
    --word-sel: rgba(124,58,237,0.12);
    --cell-size: min(48px, calc((100vw - 64px) / 7));
    --font: 'Inter', -apple-system, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }

  a.back-link { position:fixed; top:12px; left:12px; font-size:11px; color:var(--text-dim); text-decoration:none; font-weight:600; letter-spacing:0.05em; z-index:10; }

  #app { display:flex; flex-direction:column; align-items:center; padding:0 16px 60px; }

  header {
    width:100%; max-width:520px; padding:16px 0 12px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .logo { font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }
  .logo span { color:var(--text); }
  .theme-badge {
    padding:3px 10px; border-radius:999px; background:rgba(124,58,237,0.1);
    border:1px solid rgba(124,58,237,0.2); font-size:11px; font-weight:700; color:#a78bfa;
  }
  .timer { font-family:monospace; font-size:13px; font-weight:700; color:var(--text-dim); }

  #grid-wrap { margin:20px 0 8px; }
  #grid {
    display:inline-grid;
    gap:2px;
    background:rgba(255,255,255,0.06);
    padding:2px;
    border-radius:10px;
  }
  .cell {
    width:var(--cell-size); height:var(--cell-size);
    background:var(--surface); position:relative;
    display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; transition:background 0.1s;
    user-select:none;
  }
  .cell.black { background:#0a0a0b; cursor:default; }
  .cell.selected { background:var(--selected); }
  .cell.word-selected { background:var(--word-sel); }
  .cell.correct { background:rgba(34,197,94,0.12); }
  .cell input {
    position:absolute; inset:0; background:transparent; border:none;
    text-align:center; font-size:calc(var(--cell-size) * 0.4); font-weight:800;
    color:var(--text); caret-color:transparent; text-transform:uppercase;
    cursor:pointer; outline:none; padding:0; width:100%; height:100%;
    pointer-events:none;
  }
  .cell .num {
    position:absolute; top:2px; left:3px; font-size:calc(var(--cell-size) * 0.22);
    font-weight:700; color:rgba(255,255,255,0.5); line-height:1;
  }
  .cell.correct input { color:var(--correct); }

  #clues {
    width:100%; max-width:520px; display:grid; grid-template-columns:1fr 1fr; gap:12px 20px;
    margin-top:12px;
  }
  .clue-section h3 {
    font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:8px; padding-bottom:6px;
    border-bottom:1px solid var(--border);
  }
  .clue-item {
    display:flex; gap:8px; padding:5px 0; cursor:pointer; border-radius:6px;
    transition:background 0.1s; padding:5px 8px; margin:0 -8px;
  }
  .clue-item:hover { background:rgba(255,255,255,0.04); }
  .clue-item.active { background:rgba(124,58,237,0.1); }
  .clue-num { font-size:11px; font-weight:800; color:var(--accent); min-width:18px; font-variant-numeric:tabular-nums; }
  .clue-text { font-size:12px; color:rgba(255,255,255,0.7); line-height:1.5; }
  .clue-item.solved .clue-text { color:var(--correct); text-decoration:line-through; opacity:0.6; }

  #controls { display:flex; gap:8px; margin-top:14px; }
  .ctrl-btn {
    padding:10px 16px; border-radius:9px; background:var(--surface);
    border:1px solid var(--border); color:var(--text); font-size:12px;
    font-weight:700; cursor:pointer; transition:all 0.15s; letter-spacing:0.03em;
  }
  .ctrl-btn:hover { border-color:rgba(255,255,255,0.2); }
  .ctrl-btn.primary { background:var(--accent); border-color:var(--accent); }

  #toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:100;
    background:var(--text); color:var(--bg); padding:9px 18px; border-radius:9px;
    font-size:13px; font-weight:700; opacity:0; transition:opacity 0.2s; pointer-events:none; }
  #toast.show { opacity:1; }

  #win-panel { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(8px); }
  #win-panel.show { display:flex; }
  .win-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:32px 28px; max-width:360px; width:calc(100%-48px); text-align:center;
  }
  .win-card h2 { font-size:22px; font-weight:800; margin-bottom:6px; }
  .win-theme { font-size:16px; color:var(--accent); font-weight:700; margin-bottom:16px; }
  .win-stats { display:flex; gap:16px; justify-content:center; margin:12px 0 20px; }
  .win-stat .val { font-size:24px; font-weight:800; }
  .win-stat .lbl { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; }
  .close-win { width:100%; padding:12px; border-radius:10px; background:transparent;
    border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:600;
    cursor:pointer; margin-top:4px; }
</style>
</head>
<body>
<a class="back-link" href="/games">JOSHO.PRO/GAMES</a>
<div id="app">
  <header>
    <div class="logo">josho.pro / <span>CROSSWORD</span></div>
    <div id="themeLabel" class="theme-badge">Loading...</div>
    <div class="timer" id="timerEl">0:00</div>
  </header>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="controls">
    <button class="ctrl-btn" id="checkBtn">Check</button>
    <button class="ctrl-btn" id="revealBtn">Reveal Letter</button>
    <button class="ctrl-btn primary" id="clearBtn">Clear</button>
  </div>
  <div id="clues">
    <div class="clue-section" id="across-section"><h3>Across</h3></div>
    <div class="clue-section" id="down-section"><h3>Down</h3></div>
  </div>
  <div id="toast"></div>
</div>

<div id="win-panel">
  <div class="win-card">
    <h2>Puzzle Complete</h2>
    <div class="win-theme" id="winTheme"></div>
    <div class="win-stats">
      <div class="win-stat"><div class="val" id="winTime">-</div><div class="lbl">Time</div></div>
      <div class="win-stat"><div class="val" id="winErrors">0</div><div class="lbl">Errors</div></div>
      <div class="win-stat"><div class="val" id="winStreak">0</div><div class="lbl">Streak</div></div>
    </div>
    <button class="close-win" onclick="document.getElementById('win-panel').classList.remove('show')">Done</button>
  </div>
</div>

<script>
// Each puzzle: grid (null = black), numbered squares, across/down clues
const PUZZLES = [
{
  theme: "Internet Culture",
  size: 7,
  grid: [
    ["V","I","R","A","L",null,null],
    [null,"N",null,null,"I",null,null],
    [null,"F","L","E","X",null,null],
    [null,"O",null,null,null,null,null],
    [null,null,null,null,null,null,null],
    ["R","A","T","I","O",null,null],
    [null,null,null,null,null,null,null]
  ],
  clues: {
    across: [
      {num:1, row:0, col:0, len:5, clue:"Content spreading everywhere at speed"},
      {num:3, row:2, col:1, len:4, clue:"Show off on social. Hard flex."},
      {num:5, row:5, col:0, len:5, clue:"More replies than likes. Embarrassing."}
    ],

    ]
  }
},
{
  theme: "Gen Z Decoded",
  size: 7,
  grid: [
    ["B","A","S","E","D",null,null],
    [null,null,null,"X",null,null,null],
    ["S","L","A","Y",null,null,null],
    [null,null,null,null,null,null,null],
    ["V","I","B","E","S",null,null],
    [null,null,null,null,null,null,null],
    ["D","R","I","P",null,null,null]
  ],
  clues: {
    across: [
      {num:1, row:0, col:0, len:5, clue:"Correct, on point, internet-approved"},
      {num:3, row:2, col:0, len:4, clue:"Absolutely nail something"},
      {num:5, row:4, col:0, len:5, clue:"The energy or atmosphere in a room"},
      {num:7, row:6, col:0, len:4, clue:"Your outfit's swagger factor"}
    ],
    down: [
      {num:2, row:0, col:3, len:3, clue:"Anxious energy, overthinking it"}
    ]
  }
},
{
  theme: "Tech World",
  size: 7,
  grid: [
    ["S","T","A","C","K",null,null],
    [null,"O",null,null,null,null,null],
    [null,"K","E","Y","S",null,null],
    [null,"E",null,null,null,null,null],
    [null,"N","O","D","E","S",null],
    [null,null,null,null,null,null,null],
    ["B","U","I","L","D",null,null]
  ],
  clues: {
    across: [
      {num:1, row:0, col:0, len:5, clue:"Collection of technologies for an app"},
      {num:3, row:2, col:1, len:4, clue:"API secrets to unlock access"},
      {num:5, row:4, col:1, len:5, clue:"Points in a network or data graph"},
      {num:7, row:6, col:0, len:5, clue:"Compile the code, ship it"}
    ],
    down: [
      {num:2, row:0, col:1, len:5, clue:"Hint: developer. Or a stock exchange."}
    ]
  }
},
{
  theme: "Crypto Slang",
  size: 7,
  grid: [
    ["W","H","A","L","E",null,null],
    [null,null,null,null,"T",null,null],
    ["B","U","L","L","S",null,null],
    [null,null,null,null,null,null,null],
    ["M","O","O","N",null,null,null],
    [null,null,null,null,null,null,null],
    ["D","E","G","E","N",null,null]
  ],
  clues: {
    across: [
      {num:1, row:0, col:0, len:5, clue:"Holder with a massive bag of crypto"},
      {num:3, row:2, col:0, len:5, clue:"Investors expecting prices to rise"},
      {num:5, row:4, col:0, len:4, clue:"Where your coin is going (allegedly)"},
      {num:7, row:6, col:0, len:5, clue:"Reckless gambler, lives on-chain"}
    ],
    down: [
      {num:2, row:0, col:4, len:3, clue:"Short for: let's go"}
    ]
  }
},
{
  theme: "TikTok Era",
  size: 7,
  grid: [
    ["T","R","E","N","D",null,null],
    [null,null,"X",null,null,null,null],
    ["H","A","U","L",null,null,null],
    [null,null,null,null,null,null,null],
    ["C","L","O","U","T",null,null],
    [null,null,null,null,null,null,null],
    ["G","R","I","N","D",null,null]
  ],
  clues: {
    across: [
      {num:1, row:0, col:0, len:5, clue:"Everyone is doing this on FYP right now"},
      {num:3, row:2, col:0, len:4, clue:"Buy a ton of stuff, film unboxing it"},
      {num:5, row:4, col:0, len:5, clue:"Social media fame and influence"},
      {num:7, row:6, col:0, len:5, clue:"The daily hustle content creators live for"}
    ],
    down: [
      {num:2, row:0, col:2, len:3, clue:"Cringe warning emoji reaction"}
    ]
  }
}
];

let puzzle, size, cells, selectedCell, selectedDir, errors, startTime, timerIntvl, solved;
let userGrid = [];

function getDayPuzzle() {
  const origin = new Date('2026-03-01T00:00:00Z');
  return Math.floor((new Date() - origin) / 86400000) % PUZZLES.length;
}

function getTodayKey() {
  const d = new Date();
  return `josho-xw-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function init() {
  const idx = getDayPuzzle();
  puzzle = PUZZLES[idx];
  size = puzzle.size;
  cells = [];
  errors = 0;
  solved = false;
  startTime = Date.now();
  selectedCell = null;
  selectedDir = 'across';

  document.getElementById('themeLabel').textContent = puzzle.theme;
  document.getElementById('winTheme').textContent = puzzle.theme;

  // Init userGrid
  userGrid = Array.from({length:size}, (_,r) => Array.from({length:size}, (_,c) => puzzle.grid[r][c] === null ? null : ''));

  // Load saved state
  const saved = JSON.parse(localStorage.getItem(getTodayKey()) || 'null');
  if (saved) { userGrid = saved.userGrid; errors = saved.errors || 0; }

  buildGrid();
  buildClues();
  startTimer();

  document.addEventListener('keydown', handleKey);
  document.getElementById('checkBtn').onclick = checkAll;
  document.getElementById('revealBtn').onclick = revealLetter;
  document.getElementById('clearBtn').onclick = clearAll;
}

function buildGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${size}, var(--cell-size))`;
  gridEl.innerHTML = '';
  cells = [];

  // Assign numbers
  const numMap = {};
  let n = 1;
  for (let r = 0; r < size; r++) {
    cells[r] = [];
    for (let c = 0; c < size; c++) {
      if (puzzle.grid[r][c] === null) { cells[r][c] = null; continue; }
      const startsAcross = puzzle.clues.across.some(cl => cl.row===r && cl.col===c);
      const startsDown = puzzle.clues.down.some(cl => cl.row===r && cl.col===c);
      if (startsAcross || startsDown) { numMap[`${r},${c}`] = n++; }
    }
  }

  // Verify numbering matches clues
  puzzle.clues.across.forEach(cl => { cl.number = numMap[`${cl.row},${cl.col}`]; });
  puzzle.clues.down.forEach(cl => { cl.number = numMap[`${cl.row},${cl.col}`]; });

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('div');
      cell.className = puzzle.grid[r][c] === null ? 'cell black' : 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      if (puzzle.grid[r][c] !== null) {
        if (numMap[`${r},${c}`]) {
          const num = document.createElement('div');
          num.className = 'num';
          num.textContent = numMap[`${r},${c}`];
          cell.appendChild(num);
        }
        const inp = document.createElement('input');
        inp.type = 'text'; inp.maxLength = 1;
        inp.value = userGrid[r][c] || '';
        inp.readOnly = true;
        cell.appendChild(inp);
        cell.onclick = () => selectCell(r, c);
        cells[r][c] = cell;
      }
      gridEl.appendChild(cell);
    }
  }
  highlightWord();
}

function buildClues() {
  const aSection = document.getElementById('across-section');
  const dSection = document.getElementById('down-section');
  aSection.innerHTML = '<h3>Across</h3>';
  dSection.innerHTML = '<h3>Down</h3>';

  puzzle.clues.across.forEach(cl => {
    const item = document.createElement('div');
    item.className = 'clue-item';
    item.dataset.dir = 'across'; item.dataset.num = cl.number;
    item.innerHTML = `<span class="clue-num">${cl.number}</span><span class="clue-text">${cl.clue}</span>`;
    item.onclick = () => { selectedDir = 'across'; selectCell(cl.row, cl.col); };
    aSection.appendChild(item);
  });

  puzzle.clues.down.forEach(cl => {
    const item = document.createElement('div');
    item.className = 'clue-item';
    item.dataset.dir = 'down'; item.dataset.num = cl.number;
    item.innerHTML = `<span class="clue-num">${cl.number}</span><span class="clue-text">${cl.clue}</span>`;
    item.onclick = () => { selectedDir = 'down'; selectCell(cl.row, cl.col); };
    dSection.appendChild(item);
  });
}

function selectCell(r, c) {
  if (!cells[r] || !cells[r][c]) return;
  if (selectedCell && selectedCell[0] === r && selectedCell[1] === c) {
    selectedDir = selectedDir === 'across' ? 'down' : 'across';
  }
  selectedCell = [r, c];
  highlightWord();
  updateActiveClue();
}

function getWordCells(r, c, dir) {
  const clueList = dir === 'across' ? puzzle.clues.across : puzzle.clues.down;
  for (const cl of clueList) {
    for (let i = 0; i < cl.len; i++) {
      const cr = dir === 'across' ? cl.row : cl.row + i;
      const cc = dir === 'across' ? cl.col + i : cl.col;
      if (cr === r && cc === c) {
        return Array.from({length:cl.len}, (_,j) => [
          dir === 'across' ? cl.row : cl.row + j,
          dir === 'across' ? cl.col + j : cl.col
        ]);
      }
    }
  }
  return [[r,c]];
}

function highlightWord() {
  for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
    if (cells[r] && cells[r][c]) cells[r][c].classList.remove('selected','word-selected');
  }
  if (!selectedCell) return;
  const [sr, sc] = selectedCell;
  const wordCells = getWordCells(sr, sc, selectedDir);
  wordCells.forEach(([r,c]) => { if (cells[r] && cells[r][c]) cells[r][c].classList.add('word-selected'); });
  if (cells[sr] && cells[sr][sc]) cells[sr][sc].classList.add('selected');
}

function updateActiveClue() {
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  if (!selectedCell) return;
  const [r, c] = selectedCell;
  const clueList = selectedDir === 'across' ? puzzle.clues.across : puzzle.clues.down;
  for (const cl of clueList) {
    for (let i = 0; i < cl.len; i++) {
      const cr = selectedDir === 'across' ? cl.row : cl.row + i;
      const cc = selectedDir === 'across' ? cl.col + i : cl.col;
      if (cr === r && cc === c) {
        const item = document.querySelector(`.clue-item[data-dir="${selectedDir}"][data-num="${cl.number}"]`);
        if (item) { item.classList.add('active'); item.scrollIntoView({block:'nearest'}); }
        break;
      }
    }
  }
}

function handleKey(e) {
  if (!selectedCell || solved) return;
  const [r, c] = selectedCell;
  if (/^[a-zA-Z]$/.test(e.key)) {
    e.preventDefault();
    const letter = e.key.toUpperCase();
    userGrid[r][c] = letter;
    cells[r][c].querySelector('input').value = letter;
    saveState();
    advanceCursor();
  } else if (e.key === 'Backspace') {
    if (userGrid[r][c]) { userGrid[r][c] = ''; cells[r][c].querySelector('input').value = ''; saveState(); }
    else retreatCursor();
  } else if (e.key === 'ArrowRight') { e.preventDefault(); selectedDir='across'; selectCell(r,c+1<size?c+1:c); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); selectedDir='across'; selectCell(r,c-1>=0?c-1:c); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); selectedDir='down'; selectCell(r+1<size?r+1:r,c); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectedDir='down'; selectCell(r-1>=0?r-1:r,c); }
  else if (e.key === 'Tab') { e.preventDefault(); nextWord(); }
}

function advanceCursor() {
  const [r, c] = selectedCell;
  if (selectedDir === 'across' && c + 1 < size && cells[r][c+1]) selectCell(r, c+1);
  else if (selectedDir === 'down' && r + 1 < size && cells[r+1] && cells[r+1][c]) selectCell(r+1, c);
}

function retreatCursor() {
  const [r, c] = selectedCell;
  if (selectedDir === 'across' && c - 1 >= 0 && cells[r][c-1]) selectCell(r, c-1);
  else if (selectedDir === 'down' && r - 1 >= 0 && cells[r-1] && cells[r-1][c]) selectCell(r-1, c);
}

function nextWord() {
  const clues = [...puzzle.clues.across, ...puzzle.clues.down];
  const current = clues.find(cl => {
    if (!selectedCell) return false;
    const [r,c] = selectedCell;
    const dir = puzzle.clues.across.includes(cl) ? 'across' : 'down';
    for (let i = 0; i < cl.len; i++) {
      const cr = dir==='across' ? cl.row : cl.row+i;
      const cc = dir==='across' ? cl.col+i : cl.col;
      if (cr===r && cc===c) return true;
    }
    return false;
  });
  const idx = clues.indexOf(current);
  const next = clues[(idx+1) % clues.length];
  const nextDir = puzzle.clues.across.includes(next) ? 'across' : 'down';
  selectedDir = nextDir;
  selectCell(next.row, next.col);
}

function checkAll() {
  let allCorrect = true;
  for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
    if (puzzle.grid[r][c] === null || !cells[r][c]) continue;
    const val = userGrid[r][c];
    if (val && val !== puzzle.grid[r][c]) {
      errors++;
      cells[r][c].querySelector('input').style.color = '#ef4444';
      setTimeout(() => { if (cells[r][c]) cells[r][c].querySelector('input').style.color = ''; }, 1200);
    }
    if (!val || val !== puzzle.grid[r][c]) allCorrect = false;
    else cells[r][c].classList.add('correct');
  }
  if (allCorrect) winGame();
  else showToast('Keep going...');
}

function revealLetter() {
  if (!selectedCell) { showToast('Select a cell first'); return; }
  const [r,c] = selectedCell;
  if (puzzle.grid[r][c] !== null) {
    userGrid[r][c] = puzzle.grid[r][c];
    cells[r][c].querySelector('input').value = puzzle.grid[r][c];
    cells[r][c].classList.add('correct');
    saveState();
    advanceCursor();
  }
}

function clearAll() {
  for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
    if (puzzle.grid[r][c] !== null && cells[r][c]) {
      userGrid[r][c] = '';
      cells[r][c].querySelector('input').value = '';
      cells[r][c].classList.remove('correct');
      cells[r][c].querySelector('input').style.color = '';
    }
  }
  saveState();
}

function winGame() {
  solved = true;
  clearInterval(timerIntvl);
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed/60); const s = elapsed%60;
  document.getElementById('winTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('winErrors').textContent = errors;
  const streak = (parseInt(localStorage.getItem('josho-xw-streak')||'0')) + 1;
  localStorage.setItem('josho-xw-streak', streak);
  document.getElementById('winStreak').textContent = streak;
  document.getElementById('win-panel').classList.add('show');
}

function startTimer() {
  timerIntvl = setInterval(() => {
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed/60); const s = elapsed%60;
    document.getElementById('timerEl').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function saveState() {
  localStorage.setItem(getTodayKey(), JSON.stringify({userGrid, errors}));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
