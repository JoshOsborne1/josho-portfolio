<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games — josho.pro</title>
<meta name="description" content="Daily word games, crosswords, puzzles and more. Fresh every day.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --s1: #111115;
    --s2: #18181d;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
    --text: #f2f2f5;
    --dim: rgba(255,255,255,0.38);
    --muted: rgba(255,255,255,0.18);
    --accent: #8b5cf6;
    --accent-dim: rgba(139,92,246,0.12);
    --accent-glow: rgba(139,92,246,0.25);
    --green: #4ade80;
    --amber: #f59e0b;
    --f: 'Inter', -apple-system, sans-serif;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); -webkit-font-smoothing:antialiased; }
  body { min-height:100vh; }

  /* ---- NAV ---- */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:0 24px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(10,10,10,0.85); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .nav-brand {
    font-size:12px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--dim); text-decoration:none;
  }
  .nav-brand b { color:var(--text); }
  .nav-day {
    font-size:11px; font-weight:700; color:var(--dim); font-variant-numeric:tabular-nums;
    letter-spacing:0.04em;
  }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .streak-display {
    padding:4px 12px; background:var(--accent-dim); border:1px solid rgba(139,92,246,0.2);
    border-radius:999px; font-size:11px; font-weight:700; color:#c4b5fd;
    font-variant-numeric:tabular-nums;
  }

  /* ---- HERO ---- */
  .hero {
    padding:120px 24px 56px; max-width:640px; margin:0 auto;
  }
  .hero-eyebrow {
    font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--accent); margin-bottom:16px; display:flex; align-items:center; gap:8px;
  }
  .hero-eyebrow::before { content:''; display:block; width:20px; height:1px; background:var(--accent); }
  .hero h1 {
    font-size:clamp(36px, 8vw, 64px); font-weight:900; line-height:1.05; letter-spacing:-0.03em;
    color:var(--text); margin-bottom:20px;
  }
  .hero h1 em { font-style:normal; color:var(--accent); }
  .hero p {
    font-size:15px; color:var(--dim); line-height:1.7; max-width:440px;
  }
  .hero-stats {
    display:flex; gap:32px; margin-top:40px; padding-top:32px; border-top:1px solid var(--border);
  }
  .hero-stat .val { font-size:26px; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; }
  .hero-stat .lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:3px; }

  /* ---- GAMES GRID ---- */
  .grid-section { padding:0 24px 80px; max-width:1040px; margin:0 auto; }
  .section-head {
    display:flex; align-items:center; gap:12px; margin-bottom:24px;
  }
  .section-label { font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  .section-line { flex:1; height:1px; background:var(--border); }

  .games-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap:12px;
  }

  .game-card {
    display:block; text-decoration:none;
    background:var(--s1); border:1px solid var(--border); border-radius:14px;
    padding:22px; position:relative; overflow:hidden;
    transition:border-color 0.2s, transform 0.2s, background 0.2s;
    cursor:pointer;
  }
  .game-card:hover {
    border-color:var(--border-h); transform:translateY(-2px);
    background:var(--s2);
  }
  .game-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(139,92,246,0), transparent);
    transition:background 0.3s;
  }
  .game-card:hover::before {
    background:linear-gradient(90deg, transparent, rgba(139,92,246,0.35), transparent);
  }

  .card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  .card-icon {
    width:38px; height:38px; border-radius:10px;
    background:var(--accent-dim); border:1px solid rgba(139,92,246,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:800; color:var(--accent); letter-spacing:-0.02em;
  }
  .card-badge {
    padding:3px 9px; border-radius:6px; font-size:10px; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .badge-daily { background:rgba(74,222,128,0.1); color:var(--green); border:1px solid rgba(74,222,128,0.15); }
  .badge-new { background:rgba(139,92,246,0.15); color:#c4b5fd; border:1px solid rgba(139,92,246,0.2); }
  .badge-hot { background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.15); }

  .card-title { font-size:17px; font-weight:800; color:var(--text); margin-bottom:6px; letter-spacing:-0.02em; }
  .card-desc { font-size:12px; color:var(--dim); line-height:1.6; }

  .card-foot {
    display:flex; align-items:center; justify-content:space-between;
    margin-top:18px; padding-top:14px; border-top:1px solid var(--border);
  }
  .card-tag { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  .card-arrow {
    width:28px; height:28px; border-radius:8px; background:var(--s2);
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    color:var(--dim); font-size:12px; transition:all 0.15s;
  }
  .game-card:hover .card-arrow { background:var(--accent-dim); border-color:rgba(139,92,246,0.2); color:var(--accent); }

  /* ---- FOOTER ---- */
  footer {
    border-top:1px solid var(--border); padding:24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .footer-brand { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  .footer-links { display:flex; gap:20px; }
  .footer-links a { font-size:11px; color:var(--muted); text-decoration:none; font-weight:600; transition:color 0.15s; }
  .footer-links a:hover { color:var(--text); }

  /* ---- ANIMATIONS ---- */
  @keyframes fade-up {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation:fade-up 0.5s ease forwards; opacity:0; }
  .fade-up:nth-child(1) { animation-delay:0ms; }
  .fade-up:nth-child(2) { animation-delay:60ms; }
  .fade-up:nth-child(3) { animation-delay:120ms; }
  .fade-up:nth-child(4) { animation-delay:180ms; }
  .fade-up:nth-child(5) { animation-delay:240ms; }
  .fade-up:nth-child(6) { animation-delay:300ms; }
  .fade-up:nth-child(7) { animation-delay:360ms; }
  .fade-up:nth-child(8) { animation-delay:420ms; }
  .fade-up:nth-child(9) { animation-delay:480ms; }

  @media (max-width:600px) {
    .hero { padding:96px 20px 48px; }
    .hero-stats { gap:20px; }
    .grid-section { padding:0 16px 60px; }
    .games-grid { grid-template-columns:1fr; }
    nav { padding:0 16px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/"><b>JOSHO.PRO</b> / GAMES</a>
  <div class="nav-day" id="dayLabel"></div>
  <div class="nav-right">
    <div class="streak-display" id="streakDisplay">0 day streak</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">Daily Games</div>
  <h1>Think fast.<br><em>Play sharp.</em></h1>
  <p>Words, numbers, patterns — all reset at midnight. Fresh puzzles every day. Built for people with too many tabs open.</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="val" id="statGames">9</div><div class="lbl">Games</div></div>
    <div class="hero-stat"><div class="val" id="statPlayed">0</div><div class="lbl">Played today</div></div>
    <div class="hero-stat"><div class="val" id="statStreak">0</div><div class="lbl">Day streak</div></div>
  </div>
</section>

<div class="grid-section">
  <div class="section-head">
    <div class="section-label">All Games</div>
    <div class="section-line"></div>
  </div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<footer>
  <div class="footer-brand">josho.pro/games</div>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/money">Money</a>
    <a href="https://roxai.click" target="_blank">Dashboard</a>
  </div>
</footer>

<script>
const GAMES = [
  { slug:'word',       title:'Daily Word',    icon:'W',  desc:'Five letters. Six guesses. Internet slang, tech terms, and cultural touchstones — words that actually matter.',         tag:'Words',    badge:'daily' },
  { slug:'crossword',  title:'Crossword',     icon:'CW', desc:'Themed daily crossword. Internet culture, Gen Z decoded, TikTok era vocabulary. New theme every day.',                tag:'Words',    badge:'daily' },
  { slug:'trivia',     title:'Trivia',        icon:'TQ', desc:'Ten questions. Topics span viral moments, tech releases, music, and internet history. Daily refresh.',                tag:'Quiz',     badge:'daily' },
  { slug:'wordle',     title:'Word Chain',    icon:'WC', desc:'Start a word, end a word. Each answer starts with the last letter of the previous. How long can you chain?',         tag:'Words',    badge:'hot',  altSlug:'wordchain' },
  { slug:'2048',       title:'2048',          icon:'2K', desc:'Slide tiles, combine numbers, hit 2048. Infinite mode when you get there. Swipe on mobile.',                          tag:'Numbers',  badge:'hot'  },
  { slug:'sudoku',     title:'Sudoku',        icon:'SD', desc:'Three difficulty levels. Constraint-generated grids — no repeated solutions. Timer runs, solve it clean.',            tag:'Logic',    badge:'daily' },
  { slug:'memory',     title:'Memory',        icon:'MM', desc:'Flip cards, match pairs. Internet icons and memes as the deck. Difficulty scales with your score.',                  tag:'Memory',   badge:'new'  },
  { slug:'math',       title:'Math Sprint',   icon:'MX', desc:'Arithmetic at speed. Score multipliers for streaks. Framed in internet culture — because pure math is boring.',     tag:'Numbers',  badge:'hot'  },
  { slug:'wordscramble',title:'Unscramble',   icon:'US', desc:'Internet slang, acronyms, and platform-native vocabulary — all scrambled. Fastest fingers win.',                     tag:'Words',    badge:'new'  },
];

function getDayIndex() {
  const o = new Date('2026-03-01T00:00:00Z');
  return Math.floor((new Date()-o)/86400000);
}

function getTotalStreak() {
  let total = 0;
  ['josho-word-streak','josho-xw-streak','josho-trivia-streak'].forEach(k => {
    total = Math.max(total, parseInt(localStorage.getItem(k)||'0'));
  });
  return total;
}

function getPlayedToday() {
  const d = new Date();
  const key = `josho-hub-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  return parseInt(localStorage.getItem(key)||'0');
}

function init() {
  const dayIdx = getDayIndex();
  const d = new Date();
  document.getElementById('dayLabel').textContent = `Day ${dayIdx + 1} — ${d.toLocaleDateString('en-GB',{weekday:'long',month:'short',day:'numeric'})}`;

  const streak = getTotalStreak();
  document.getElementById('streakDisplay').textContent = streak + ' day streak';
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statPlayed').textContent = getPlayedToday();

  const grid = document.getElementById('gamesGrid');
  GAMES.forEach((g, i) => {
    const slug = g.altSlug || g.slug;
    const badgeLabels = { daily:'Daily', new:'New', hot:'Hot' };
    const badgeClass = { daily:'badge-daily', new:'badge-new', hot:'badge-hot' };
    const card = document.createElement('a');
    card.className = 'game-card fade-up';
    card.href = slug + '.html';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-icon">${g.icon}</div>
        <div class="card-badge ${badgeClass[g.badge]}">${badgeLabels[g.badge]}</div>
      </div>
      <div class="card-title">${g.title}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="card-foot">
        <div class="card-tag">${g.tag}</div>
        <div class="card-arrow">&#8594;</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

init();
</script>
</body>
</html>
