<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Word — josho.pro/games</title>
<meta name="description" content="5-letter word game. Six guesses. Internet slang, tech terms, cultural touchstones.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --s1: #111115;
    --s2: #18181d;
    --border: rgba(255,255,255,0.07);
    --text: #f2f2f5;
    --dim: rgba(255,255,255,0.38);
    --muted: rgba(255,255,255,0.18);
    --accent: #8b5cf6;
    --accent-dim: rgba(139,92,246,0.12);
    --green: #4ade80;
    --amber: #f59e0b;
    --wrong: #1c1c23;
    --f: 'Inter', -apple-system, sans-serif;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); -webkit-font-smoothing:antialiased; }
  body { min-height:100vh; padding:0 20px; }

  #app { max-width:480px; margin:0 auto; }

  a.back { position:fixed; top:16px; left:16px; font-size:10px; color:var(--dim); text-decoration:none; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
  a.back:hover { color:var(--text); }

  header {
    padding:20px 0 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .hdr-title b { color:var(--text); }
  .hdr-right { display:flex; gap:8px; align-items:center; }
  .badge { padding:4px 10px; border-radius:6px; background:var(--accent-dim); border:1px solid rgba(139,92,246,0.15); font-size:10px; font-weight:700; color:#c4b5fd; }

  #board { display:grid; gap:6px; margin:24px 0 20px; }
  .row { display:grid; grid-template-columns:repeat(5, 1fr); gap:6px; }
  .tile {
    aspect-ratio:1; border-radius:8px; border:2px solid var(--border);
    background:var(--s1); display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:900; letter-spacing:-0.03em; transition:all 0.1s;
    user-select:none; position:relative;
  }
  .tile.filled { border-color:rgba(255,255,255,0.2); }
  .tile.flip { animation:flip-out 0.35s ease forwards; }
  .tile[data-state="correct"] { background:var(--green); border-color:var(--green); color:#000; font-weight:900; }
  .tile[data-state="present"] { background:var(--amber); border-color:var(--amber); color:#000; font-weight:900; }
  .tile[data-state="absent"] { background:var(--wrong); border-color:var(--wrong); color:rgba(255,255,255,0.2); font-weight:900; }
  .row.shake { animation:shake 0.4s ease; }

  @keyframes flip-out {
    0% { transform:scaleY(1); }
    50% { transform:scaleY(0); }
    100% { transform:scaleY(1); }
  }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    12%,88% { transform:translateX(-4px); }
    25%,75% { transform:translateX(4px); }
  }

  #keyboard { display:flex; flex-direction:column; gap:6px; }
  .kb-row { display:flex; gap:4px; justify-content:center; }
  .key {
    min-width:30px; height:42px; border-radius:6px; background:var(--s1);
    border:1px solid var(--border); color:var(--text); font-size:11px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.12s; flex:1; max-width:40px; user-select:none;
  }
  .key:active { transform:scale(0.92); }
  .key.wide { min-width:50px; max-width:60px; font-size:9px; letter-spacing:0.06em; }
  .key[data-state="correct"] { background:var(--green); border-color:var(--green); color:#000; }
  .key[data-state="present"] { background:var(--amber); border-color:var(--amber); color:#000; }
  .key[data-state="absent"] { background:var(--wrong); border-color:var(--wrong); color:rgba(255,255,255,0.15); }

  #toast-area { position:fixed; top:90px; left:50%; transform:translateX(-50%); z-index:100; }
  .toast {
    background:var(--text); color:var(--bg); padding:10px 18px; border-radius:8px;
    font-size:12px; font-weight:700; white-space:nowrap;
    animation:toast-pop 0.25s ease; margin-bottom:6px;
  }
  @keyframes toast-pop {
    from { opacity:0; transform:translateY(-8px); }
    to { opacity:1; transform:translateY(0); }
  }

  #result { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
    align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(10px); }
  #result.show { display:flex; }
  .result-card {
    background:var(--s1); border:1px solid var(--border); border-radius:16px;
    padding:32px 24px; max-width:340px; width:calc(100%-40px); text-align:center;
  }
  .result-title { font-size:22px; font-weight:900; margin-bottom:4px; }
  .result-word { font-size:26px; font-weight:900; letter-spacing:-0.03em; color:var(--green); margin:16px 0 12px; font-variant-numeric:tabular-nums; }
  .result-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin:16px 0 20px; }
  .stat-item .val { font-size:20px; font-weight:900; color:var(--text); }
  .stat-item .lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; }
  .share-btn { width:100%; padding:12px; background:var(--accent); border:none; color:#fff; font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; transition:opacity 0.15s; }
  .share-btn:hover { opacity:0.85; }
  .copy-feedback { font-size:10px; color:var(--green); margin-top:8px; min-height:12px; }
  .close-btn { width:100%; padding:10px; background:transparent; border:1px solid var(--border); color:var(--text); font-size:11px; font-weight:600; border-radius:8px; cursor:pointer; margin-top:8px; }

  @media(max-width:420px) {
    .key { max-width:36px; font-size:10px; }
    .tile { font-size:20px; }
  }
</style>
</head>
<body>
<a class="back" href="/games/">Back</a>
<div id="app">
  <header>
    <div class="hdr-title">josho.pro / <b>Word</b></div>
    <div class="hdr-right">
      <div class="badge" id="dayBadge">Day 1</div>
      <div class="badge" id="streakBadge">0 streak</div>
    </div>
  </header>
  <div id="board"></div>
  <div id="keyboard"></div>
  <div id="toast-area"></div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-title" id="resultTitle">Done</div>
    <div class="result-word" id="resultWord"></div>
    <div class="result-stats">
      <div class="stat-item"><div class="val" id="statGuesses">-</div><div class="lbl">Guesses</div></div>
      <div class="stat-item"><div class="val" id="statTime">-</div><div class="lbl">Time</div></div>
      <div class="stat-item"><div class="val" id="statStreak">-</div><div class="lbl">Streak</div></div>
    </div>
    <button class="share-btn" id="shareBtn">Copy to share</button>
    <div class="copy-feedback" id="copyMsg"></div>
    <button class="close-btn" id="closeBtn">Close</button>
  </div>
</div>

<script>
const WORDS = ["ABOUT","ABUSE","ACTOR","ACUTE","ADMIT","ADOPT","ADULT","AFTER","AGAIN","AGENT","AGREE","AHEAD","ALARM","ALBUM","ALERT","ALIKE","ALIVE","ALLEY","ALLOW","ALONE","ALONG","ALTER","ANGEL","ANGER","ANGLE","ANGRY","ANNOY","APART","APPLY","ARENA","ARGUE","ARISE","ARMOR","AROMA","ARROW","AUDIO","AUDIT","AVOID","AWFUL","BACON","BADGE","BADLY","BAKER","BAKED","BANGS","BANKS","BELLE","BENCH","BINGE","BLACK","BLAND","BLANK","BLAST","BLEED","BLEND","BLISS","BLOOM","BLOWN","BOARD","BOOST","BOOTH","BOXER","BRAIN","BRAVE","BREAK","BRIDE","BRIEF","BRINE","BRISK","BROAD","BROKE","BRUSH","BUDGE","BUNCH","BURST","BUYER","CABLE","CACHE","CANDY","CARGO","CARRY","CAUSE","CHAIN","CHAIR","CHAMP","CHAOS","CHARM","CHASE","CHEAP","CHEAT","CHECK","CHEEK","CHESS","CHEST","CHILD","CHIME","CHIMP","CHOKE","CHOSE","CHURN","CIVIC","CLAIM","CLAMP","CLANK","CLASH","CLASP","CLEAN","CLEAR","CLIMB","CLING","CLOSE","CLOUD","CLUNK","COACH","COAST","COMET","COMIC","CORAL","COUNT","COVER","CRAFT","CRANE","CRAVE","CRAWL","CRAZY","CREAK","CREEK","CREEP","CRIMP","CROSS","CROWD","CROWN","CRUMB","CRUST","CURLY","CURVE","CYCLE","DAILY","DANCE","DAZED","DEALT","DECAY","DECOY","DELAY","DEPOT","DEPTH","DERBY","DIGIT","DISCO","DIZZY","DODGE","DONOR","DOUBT","DOUGH","DOZEN","DRAMA","DRAWN","DREAM","DRESS","DRIED","DRINK","DRIVE","DRONE","DROVE","DRUNK","DRYER","DUMMY","DUSTY","DYING","EAGER","EARLY","EARTH","EIGHT","EMOJI","EMPTY","ENEMY","ENJOY","ENTER","EQUAL","ERROR","ESSAY","EXACT","EVENT","EVERY","EXIST","FABLE","FAINT","FAIRY","FAITH","FANCY","FATAL","FAULT","FEAST","FIELD","FIFTH","FIFTY","FIGHT","FLAIR","FLAME","FLANK","FLARE","FLESH","FLOCK","FLOOD","FLOSS","FLUID","FOCUS","FOGGY","FORCE","FORGE","FORTE","FOUND","FRAUD","FREAK","FRESH","FRONT","FROZE","FRUIT","FULLY","FUNNY","FUZZY","GENRE","GHOST","GIANT","GIVEN","GLARE","GLASS","GLAZE","GLIDE","GLOBE","GLOSS","GLOVE","GONNA","GOOFY","GRACE","GRADE","GRASP","GRASS","GRAVE","GREAT","GREET","GRIEF","GRUFF","GUARD","GUEST","GUSTO","HABIT","HAPPY","HARSH","HEART","HEAVY","HEDGE","HEIST","HELLO","HIPPO","HOARD","HONEY","HONOR","HOTEL","HOUND","HOUSE","HOVER","HUMAN","HUMID","HUMOR","HURRY","HYPER","IDIOM","IMPLY","INDEX","INDIE","INPUT","IRONY","ISSUE","IVORY","JEWEL","JOKER","JUMBO","JUMPY","JUICY","LABEL","LANCE","LARGE","LATER","LAUGH","LAYER","LEARN","LEAVE","LEGAL","LEMON","LEVEL","LIGHT","LIMIT","LINEN","LINER","LIVER","LOCAL","LODGE","LOGIC","LOOSE","LOVER","LUCKY","LUMPY","LUNCH","LYRIC","MACRO","MAKER","MANOR","MAPLE","MARCH","MARSH","MATCH","MAYOR","MEDIA","MERCY","MESSY","METAL","MIGHT","MIMIC","MIRTH","MISER","MIXED","MODEL","MONEY","MONTH","MORAL","MOTIF","MOUND","MOUNT","MOURN","MOVER","MOVIE","MUDDY","MUSHY","MUSKY","MUSTY","NAIVE","NASTY","NAVAL","NEEDY","NEVER","NEXUS","NIGHT","NINJA","NOBLE","NOISY","NORTH","NOTCH","NOVEL","NUDGE","OFFER","OFTEN","ORDER","OUTER","PACED","PANEL","PANIC","PAUSE","PEACE","PEACH","PEARL","PEDAL","PEPPY","PERKY","PETTY","PIANO","PIECE","PILOT","PINCH","PIXIE","PLACE","PLAIN","PLANE","PLANT","PLATE","PLAZA","PLEAD","PLEAT","PLUCK","PLUME","PLUMP","POINT","POKER","POLAR","POTTY","POWER","PRANK","PRESS","PRICE","PRIDE","PRIME","PRINT","PRIOR","PRIZE","PROBE","PROOF","PROSE","PROUD","PROVE","PROWL","PULSE","PUNCH","PUPIL","PURSE","PUSHY","QUEEN","QUERY","QUEUE","QUICK","QUIET","QUOTA","QUOTE","RABID","RADIO","RALLY","RAMEN","RANCH","RAPID","RAVEN","REACH","REALM","REBEL","RECAP","REFER","REIGN","RELAX","RELAY","REPAY","RIDER","RIDGE","RIFLE","RIGHT","RIGOR","RISEN","RIVET","ROCKY","ROUGH","ROUND","ROWDY","ROYAL","RUGBY","RULER","RUMOR","RUSTY","SADLY","SAINT","SALAD","SAUNA","SAVOR","SCENE","SCORE","SCOUT","SHAKE","SHAME","SHAPE","SHELF","SHELL","SHIFT","SHINE","SHIRT","SHOCK","SHORE","SHORT","SHOUT","SIGHT","SILLY","SINCE","SIXTH","SIXTY","SKILL","SKULL","SLASH","SLATE","SLEEP","SLEEK","SLICE","SLIDE","SLIME","SLOPE","SLOTH","SLUMP","SMALL","SMART","SMELL","SMILE","SMOKE","SNEAK","SNIFF","SOLAR","SOLVE","SORRY","SOUTH","SPACE","SPARE","SPARK","SPEAK","SPEAR","SPEED","SPEND","SPICE","SPIKE","SPILL","SPINE","SPITE","SPLIT","SPOKE","SPOOL","SPOON","SPORT","SPRAY","SQUAD","STAIN","STAKE","STALE","STAND","STARE","START","STATE","STEEP","STEER","STERN","STICK","STILL","STING","STOCK","STOMP","STONE","STOOL","STOUT","STORM","STORY","STRAW","STRIP","STUCK","STUDY","STUMP","STUNT","STYLE","SUGAR","SUNNY","SUPER","SURGE","SUSHI","SWEAR","SWEAT","SWEEP","SWEET","SWORD","TABOO","TAUNT","THORN","THREE","TIGER","TIGHT","TIMER","TIRED","TITLE","TODAY","TORCH","TOTAL","TOUCH","TOUGH","TOWEL","TOWER","TRACK","TRADE","TRAIN","TRAIT","TRASH","TREAT","TREND","TRIAL","TRICK","TROLL","TRUNK","TRUST","TRUTH","TWIST","UNDER","UNTIL","USUAL","UTTER","VAGUE","VALUE","VERSE","VIDEO","VIGOR","VIVID","VOCAB","VODKA","VOICE","VOTER","WACKY","WALTZ","WATCH","WATER","WEARY","WEDGE","WEIRD","WHILE","WITCH","WOMAN","WORLD","WORRY","WORSE","WORST","WORTH","WOUND","WRONG","WROTE","YOUNG","YOUTH","ZEBRA","VIRAL","CLOUT","RATIO","BASED","VALID","VIBES","SALTY","SHOOK","EXTRA","SAUCE","GRIND","SQUAD","SHADE","SPILL","TOXIC","GOATS","DRIPS","BRAND","DROPS","HYPES","BLOCK","CODED","ALPHA","STACK","TOKEN","BUILD","CLONE","MERGE","PATCH","DEBUG","CRASH","SPAWN","PIXEL","NODES","BULLS","BEARS","CALLS","PUMPS","POOLS","STAKE","YIELD","DELTA","HEDGE","SWAPS","LOANS","BONDS","COINS","BURNS","FLOOR","MINTS","WHALE","SHIPS","STANS","SPOIL","CANON","TROPE","SWIFT","FEVER","GOLDS","SMASH","CRUSH","MOODS","READS","BLAZE","CRISP","DREAD","ELITE","FLASH","GLOOM","HAVOC","NERVE","ORBIT","QUEST","RISKY","SIREN","UPPER","VITAL","WRATH","BLUNT","CHUNK","DRAFT","EPOCH","FLICK","GRASP","HASTE","INBOX","KARMA","LASER","MINOR","NOISE","PIVOT","QUIRK","RADAR","SLICK","TASTY","ULTRA","VENOM","WHIFF","YEARN","ZILCH"];

const MAX_TRIES = 6;
let target, tries, guesses, startMs, gameOver;

function dayIndex() {
  const origin = new Date('2026-03-01T00:00:00Z');
  return Math.floor((new Date() - origin) / 86400000) % WORDS.length;
}

function todayKey() {
  const d = new Date();
  return `josho-word-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function init() {
  const day = dayIndex();
  target = WORDS[day];
  tries = 0;
  guesses = [];
  startMs = Date.now();
  gameOver = false;

  document.getElementById('dayBadge').textContent = `Day ${day + 1}`;
  updateStreakDisplay();

  buildBoard();
  buildKeyboard();

  const saved = JSON.parse(localStorage.getItem(todayKey()) || 'null');
  if (saved) {
    guesses = saved.guesses || [];
    tries = saved.tries || 0;
    gameOver = saved.gameOver || false;
    restoreBoard();
    if (gameOver) setTimeout(() => showResult(), 500);
  }

  document.addEventListener('keydown', e => {
    if (gameOver) return;
    if (/^[a-z]$/i.test(e.key)) addLetter(e.key.toUpperCase());
    else if (e.key === 'Backspace') removeLetter();
    else if (e.key === 'Enter') submit();
  });
  
  document.getElementById('shareBtn').onclick = share;
  document.getElementById('closeBtn').onclick = () => document.getElementById('result').classList.remove('show');
}

function buildBoard() {
  const bd = document.getElementById('board');
  bd.innerHTML = '';
  for (let r = 0; r < MAX_TRIES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    bd.appendChild(row);
  }
}

function buildKeyboard() {
  const kbRows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','DEL']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  kbRows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('div');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      btn.onclick = () => {
        if (k === 'ENTER') submit();
        else if (k === 'DEL') removeLetter();
        else addLetter(k);
      };
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function currentGuess() {
  if (tries >= guesses.length) return '';
  return guesses[tries];
}

function addLetter(k) {
  if (currentGuess().length >= 5) return;
  const row = currentGuess() + k;
  
  const col = row.length - 1;
  const tile = document.getElementById(`tile-${tries}-${col}`);
  tile.textContent = k;
  tile.classList.add('filled');
  
  guesses[tries] = row;
  save();
}

function removeLetter() {
  const g = currentGuess();
  if (g.length === 0) return;
  const col = g.length - 1;
  guesses[tries] = g.slice(0, -1);
  
  const tile = document.getElementById(`tile-${tries}-${col}`);
  tile.textContent = '';
  tile.classList.remove('filled');
  save();
}

function submit() {
  const g = currentGuess();
  if (g.length !== 5) { toast('Need 5 letters'); return; }
  if (!WORDS.includes(g)) { shake(tries); toast('Not a word'); return; }
  
  revealRow(tries, g, () => {
    if (g === target) {
      gameOver = true;
      updateStreak(true);
      save();
      setTimeout(() => showResult(), 500);
    } else if (tries + 1 >= MAX_TRIES) {
      gameOver = true;
      updateStreak(false);
      save();
      setTimeout(() => showResult(), 500);
    } else {
      tries++;
      save();
    }
  });
}

function score(guess) {
  const s = Array(5).fill('absent');
  const t = target.split('');
  const used = new Set();
  
  for (let i = 0; i < 5; i++) {
    if (guess[i] === t[i]) { s[i] = 'correct'; used.add(i); }
  }
  for (let i = 0; i < 5; i++) {
    if (s[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used.has(j) && guess[i] === t[j]) { s[i] = 'present'; used.add(j); break; }
    }
  }
  return s;
}

function revealRow(r, guess, cb) {
  const s = score(guess);
  let done = 0;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${r}-${c}`);
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => {
        tile.dataset.state = s[c];
        done++;
        if (done === 5) cb();
      }, 175);
    }, c * 80);
  }
  s.forEach((st, i) => {
    const keys = document.querySelectorAll(`.key[data-key="${guess[i]}"]`);
    keys.forEach(k => {
      const cur = k.dataset.state || '';
      const pri = { correct: 3, present: 2, absent: 1 };
      if ((pri[st] || 0) > (pri[cur] || 0)) k.dataset.state = st;
    });
  });
}

function restoreBoard() {
  guesses.forEach((g, r) => {
    const s = score(g);
    g.split('').forEach((c, col) => {
      const tile = document.getElementById(`tile-${r}-${col}`);
      tile.textContent = c;
      tile.dataset.state = s[col];
    });
  });
}

function shake(r) {
  const row = document.getElementById(`row-${r}`);
  row.classList.add('shake');
  setTimeout(() => row.classList.remove('shake'), 400);
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toast-area').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 250); }, 1800);
}

function updateStreakDisplay() {
  const s = parseInt(localStorage.getItem('josho-word-streak') || '0');
  document.getElementById('streakBadge').textContent = s + ' streak';
}

function updateStreak(won) {
  const lastKey = 'josho-word-last';
  const streakKey = 'josho-word-streak';
  const day = dayIndex();
  const lastDay = parseInt(localStorage.getItem(lastKey) || '-1');
  
  if (won) {
    if (lastDay === day - 1) {
      const s = parseInt(localStorage.getItem(streakKey) || '0') + 1;
      localStorage.setItem(streakKey, s);
    } else if (lastDay !== day) {
      localStorage.setItem(streakKey, '1');
    }
    localStorage.setItem(lastKey, day);
  }
  updateStreakDisplay();
}

function showResult() {
  const won = guesses[tries] === target;
  const time = Math.round((Date.now() - startMs) / 1000);
  
  document.getElementById('resultTitle').textContent = won ? 'Solved' : 'Game Over';
  document.getElementById('resultWord').textContent = target;
  document.getElementById('statGuesses').textContent = won ? (tries + 1) + '/6' : 'X/6';
  document.getElementById('statTime').textContent = time + 's';
  document.getElementById('statStreak').textContent = localStorage.getItem('josho-word-streak') || '0';
  
  document.getElementById('result').classList.add('show');
}

function share() {
  const blocks = ['⬛','🟨','🟩'];
  const won = guesses[tries] === target;
  const lines = guesses.map(g => score(g).map(s => blocks[['absent','present','correct'].indexOf(s)]).join('')).join('\n');
  const text = `josho.pro/games/word\nDay ${dayIndex() + 1}  ${won ? (tries + 1) : 'X'}/6\n\n${lines}`;
  
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyMsg').textContent = 'Copied';
    setTimeout(() => document.getElementById('copyMsg').textContent = '', 2000);
  });
}

function save() {
  localStorage.setItem(todayKey(), JSON.stringify({ guesses, tries, gameOver }));
}

init();
</script>
</body>
</html>
