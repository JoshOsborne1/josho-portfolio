<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Sprint — josho.pro/games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a; --s1:#111115; --border:rgba(255,255,255,0.07); --text:#f2f2f5; --dim:rgba(255,255,255,0.38); --accent:#8b5cf6; --green:#4ade80; --f:'Inter',-apple-system,sans-serif; }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); }
  body { min-height:100vh; padding:0 20px; }
  a.back { position:fixed; top:16px; left:16px; font-size:10px; color:var(--dim); text-decoration:none; font-weight:700; letter-spacing:0.08em; }
  #app { max-width:520px; margin:0 auto; }
  header { padding:20px 0 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .hdr-title b { color:var(--text); }
  .badge { padding:4px 10px; border-radius:6px; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.15); font-size:10px; font-weight:700; color:#c4b5fd; }
  .timer { font-family:monospace; font-size:12px; color:var(--dim); font-weight:700; }
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
  .stat { background:var(--s1); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .stat-val { font-size:20px; font-weight:900; color:var(--accent); }
  .stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; }
  .problem { background:var(--s1); border:2px solid var(--border); border-radius:12px; padding:32px; text-align:center; margin:24px 0; }
  .problem-text { font-size:32px; font-weight:900; letter-spacing:-0.03em; margin-bottom:24px; }
  .input-area { display:flex; gap:8px; }
  #answer { flex:1; padding:14px 16px; border-radius:8px; background:transparent; border:2px solid var(--accent); color:var(--text); font-size:18px; font-weight:800; font-family:var(--f); text-align:center; }
  #answer:focus { outline:none; }
  .submit-btn { padding:14px 24px; background:var(--accent); border:none; color:#fff; font-size:14px; font-weight:800; border-radius:8px; cursor:pointer; }
  #result { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(10px); }
  #result.show { display:flex; }
  .result-card { background:var(--s1); border:1px solid var(--border); border-radius:16px; padding:32px 24px; max-width:340px; width:calc(100%-40px); text-align:center; }
  .result-score { font-size:32px; font-weight:900; color:var(--green); margin-bottom:12px; }
  .btn-close { width:100%; padding:12px; background:transparent; border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>
<a class="back" href="/games/">Back</a>
<div id="app">
  <header>
    <div class="hdr-title">josho.pro / <b>Math</b></div>
    <div class="timer" id="timer">0:00</div>
  </header>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="score">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat"><div class="stat-val" id="streak">0</div><div class="stat-lbl">Streak</div></div>
    <div class="stat"><div class="stat-val" id="wrong">0</div><div class="stat-lbl">Wrong</div></div>
  </div>
  <div class="problem">
    <div class="problem-text" id="problem">12 + 5</div>
    <div class="input-area">
      <input type="number" id="answer" inputmode="numeric" placeholder="?">
      <button class="submit-btn" onclick="submit()">Go</button>
    </div>
  </div>
</div>
<div id="result">
  <div class="result-card">
    <div style="font-size:20px; font-weight:900; margin-bottom:12px;">Time</div>
    <div class="result-score" id="resultScore">15 seconds</div>
    <button class="btn-close" onclick="location.href='/games/'">Done</button>
  </div>
</div>
<script>
let score, streak, wrong, count, startTime, timerIntvl;

function genProblem() {
  const op = ['+','-','*'][Math.floor(Math.random()*3)];
  const a = Math.floor(Math.random() * 20) + 1;
  const b = Math.floor(Math.random() * 20) + 1;
  const answer = op === '+' ? a + b : op === '-' ? a - b : a * b;
  return { expr: `${a} ${op} ${b}`, answer };
}

function init() {
  score = 0;
  streak = 0;
  wrong = 0;
  count = 0;
  startTime = Date.now();
  showProblem();
  startTimer();
  document.getElementById('answer').onkeydown = e => e.key === 'Enter' && submit();
}

function showProblem() {
  const p = genProblem();
  document.getElementById('problem').dataset.answer = p.answer;
  document.getElementById('problem').textContent = p.expr;
  document.getElementById('answer').value = '';
  document.getElementById('answer').focus();
}

function submit() {
  const ans = parseInt(document.getElementById('answer').value);
  const correct = parseInt(document.getElementById('problem').dataset.answer);
  
  if (isNaN(ans)) return;
  
  if (ans === correct) {
    score++;
    streak++;
    count++;
  } else {
    wrong++;
    streak = 0;
  }
  
  if (count >= 10) {
    clearInterval(timerIntvl);
    showFinalResult();
  } else {
    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;
    document.getElementById('wrong').textContent = wrong;
    showProblem();
  }
}

function startTimer() {
  timerIntvl = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('timer').textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

function showFinalResult() {
  const time = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('resultScore').textContent = `${score}/10 in ${time}s`;
  document.getElementById('result').classList.add('show');
}

init();
</script>
</body>
</html>
