<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unscramble — josho.pro/games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a; --s1:#111115; --border:rgba(255,255,255,0.07); --text:#f2f2f5; --dim:rgba(255,255,255,0.38); --accent:#8b5cf6; --green:#4ade80; --f:'Inter',-apple-system,sans-serif; }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); }
  body { min-height:100vh; padding:0 20px; }
  a.back { position:fixed; top:16px; left:16px; font-size:10px; color:var(--dim); text-decoration:none; font-weight:700; letter-spacing:0.08em; }
  #app { max-width:520px; margin:0 auto; }
  header { padding:20px 0 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .hdr-title b { color:var(--text); }
  .badge { padding:4px 10px; border-radius:6px; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.15); font-size:10px; font-weight:700; color:#c4b5fd; }
  .timer { font-family:monospace; font-size:12px; color:var(--dim); font-weight:700; }
  .progress { width:100%; height:3px; background:var(--border); border-radius:999px; overflow:hidden; margin:20px 0; }
  .progress-fill { height:100%; background:var(--accent); transition:width 0.3s; }
  .problem { background:var(--s1); border:2px solid var(--border); border-radius:12px; padding:28px; text-align:center; margin:20px 0; }
  .scrambled { font-size:28px; font-weight:800; letter-spacing:0.05em; margin-bottom:16px; color:var(--accent); }
  .hint { font-size:11px; color:var(--dim); margin-bottom:16px; }
  .input-area { display:flex; gap:8px; }
  #answer { flex:1; padding:12px 14px; border-radius:8px; border:2px solid var(--accent); background:transparent; color:var(--text); font-size:16px; font-weight:700; font-family:var(--f); text-transform:uppercase; }
  #answer:focus { outline:none; }
  .submit-btn { padding:12px 20px; background:var(--accent); border:none; color:#fff; font-size:12px; font-weight:800; border-radius:8px; cursor:pointer; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
  .stat { background:var(--s1); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .stat-val { font-size:20px; font-weight:900; color:var(--green); }
  .stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:4px; }
  #result { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(10px); }
  #result.show { display:flex; }
  .result-card { background:var(--s1); border:1px solid var(--border); border-radius:16px; padding:32px 24px; max-width:340px; width:calc(100%-40px); text-align:center; }
  .result-score { font-size:32px; font-weight:900; color:var(--green); margin-bottom:12px; }
  .btn-close { width:100%; padding:12px; background:transparent; border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>
<a class="back" href="/games/">Back</a>
<div id="app">
  <header>
    <div class="hdr-title">josho.pro / <b>Unscramble</b></div>
    <div class="timer" id="timer">0:00</div>
  </header>
  <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="problem">
    <div class="scrambled" id="scrambled">LIRAVY</div>
    <div class="hint" id="hint">Internet culture word</div>
    <div class="input-area">
      <input type="text" id="answer" placeholder="Type word...">
      <button class="submit-btn" onclick="submit()">Go</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="score">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat"><div class="stat-val" id="total">10</div><div class="stat-lbl">Total</div></div>
  </div>
</div>
<div id="result">
  <div class="result-card">
    <div style="font-size:20px; font-weight:900; margin-bottom:12px;">Complete</div>
    <div class="result-score" id="resultScore">8/10</div>
    <button class="btn-close" onclick="location.href='/games/'">Done</button>
  </div>
</div>
<script>
const PUZZLES = [
  {word:'VIRAL', hint:'Spreading online rapidly'},
  {word:'CLOUT', hint:'Social influence'},
  {word:'RATIO', hint:'When replies exceed likes'},
  {word:'BASED', hint:'Authentic and unapologetic'},
  {word:'SALTY', hint:'Bitter or upset'},
  {word:'GRIND', hint:'The daily hustle'},
  {word:'STACK', hint:'Accumulate wealth'},
  {word:'FLEX', hint:'Show off'},
  {word:'DRIP', hint:'Your style game'},
  {word:'VIBE', hint:'The energy you feel'},
];

let current, score, startTime, timerIntvl;

function shuffleWord(w) {
  const a = w.split('');
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.join('');
}

function init() {
  current = 0;
  score = 0;
  startTime = Date.now();
  loadPuzzle();
  startTimer();
  document.getElementById('answer').onkeydown = e => e.key === 'Enter' && submit();
}

function loadPuzzle() {
  const p = PUZZLES[current];
  document.getElementById('scrambled').textContent = shuffleWord(p.word);
  document.getElementById('hint').textContent = p.hint;
  document.getElementById('scrambled').dataset.answer = p.word;
  document.getElementById('answer').value = '';
  document.getElementById('answer').focus();
  updateProgress();
}

function submit() {
  const ans = document.getElementById('answer').value.toUpperCase().trim();
  const correct = document.getElementById('scrambled').dataset.answer;
  
  if (ans === correct) {
    score++;
    document.getElementById('score').textContent = score;
  }
  
  current++;
  if (current >= PUZZLES.length) {
    clearInterval(timerIntvl);
    endGame();
  } else {
    loadPuzzle();
  }
}

function updateProgress() {
  const pct = ((current + 1) / PUZZLES.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function startTimer() {
  timerIntvl = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('timer').textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

function endGame() {
  const time = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('resultScore').textContent = `${score}/10 - ${time}s`;
  document.getElementById('result').classList.add('show');
}

init();
</script>
</body>
</html>
