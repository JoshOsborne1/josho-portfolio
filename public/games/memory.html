<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory — josho.pro/games</title>
<meta name="description" content="Flip cards and match pairs. Internet icons as the deck.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --s1: #111115;
    --border: rgba(255,255,255,0.07);
    --text: #f2f2f5;
    --dim: rgba(255,255,255,0.38);
    --accent: #8b5cf6;
    --green: #4ade80;
    --f: 'Inter', -apple-system, sans-serif;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); -webkit-font-smoothing:antialiased; }
  body { min-height:100vh; padding:0 20px; }

  a.back { position:fixed; top:16px; left:16px; font-size:10px; color:var(--dim); text-decoration:none; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }

  #app { max-width:520px; margin:0 auto; }

  header {
    padding:20px 0 16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .hdr-title b { color:var(--text); }
  .stats { display:flex; gap:12px; }
  .badge { padding:4px 10px; border-radius:6px; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.15); font-size:10px; font-weight:700; color:#c4b5fd; }

  .game-info { margin:20px 0; display:flex; justify-content:space-between; align-items:center; }
  .timer { font-family:monospace; font-size:12px; color:var(--dim); font-weight:700; }
  .moves { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; }

  #board {
    display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;
    margin:20px 0;
  }
  .card {
    aspect-ratio:1; border-radius:8px; background:var(--s1); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:28px;
    cursor:pointer; transition:all 0.15s; position:relative;
    -webkit-user-select:none; user-select:none;
  }
  .card:hover { border-color:rgba(255,255,255,0.15); }
  .card.flipped { background:var(--accent); border-color:var(--accent); }
  .card.matched { background:var(--green); border-color:var(--green); cursor:default; }
  .card.flipped.showing-back { color:transparent; }

  .controls { display:flex; gap:8px; }
  .btn { flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--s1); color:var(--text); font-size:12px; font-weight:700; cursor:pointer; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

  #result { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
    align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(10px); }
  #result.show { display:flex; }
  .result-card { background:var(--s1); border:1px solid var(--border); border-radius:16px; padding:32px 24px; max-width:340px; width:calc(100%-40px); text-align:center; }
  .result-score { font-size:28px; font-weight:900; color:var(--green); margin-bottom:12px; }
  .result-text { font-size:12px; color:var(--dim); margin-bottom:20px; }
  .btn-close { width:100%; padding:12px; background:transparent; border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>
<a class="back" href="/games/">Back</a>
<div id="app">
  <header>
    <div class="hdr-title">josho.pro / <b>Memory</b></div>
    <div class="stats">
      <div class="badge" id="levelBadge">Easy</div>
    </div>
  </header>

  <div class="game-info">
    <div class="timer" id="timer">0:00</div>
    <div class="moves" id="moves">0 moves</div>
  </div>

  <div id="board"></div>

  <div class="controls">
    <button class="btn primary" id="newBtn">New Game</button>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-score" id="resultScore">32</div>
    <div class="result-text" id="resultText">You win!</div>
    <button class="btn-close" onclick="location.href='/games/'">Done</button>
  </div>
</div>

<script>
const ICONS = ['🎮','🎯','🎨','🎭','🎪','🎬','📱','💻','🎸','🎹','📚','🎓','🏆','⚡','🚀','✨'];

let cards, flipped, matched, moves, startTime, timerIntvl, level;

function init() {
  level = 0;
  cards = shuffleArray([...ICONS, ...ICONS]);
  flipped = [];
  matched = new Set();
  moves = 0;
  startTime = Date.now();

  document.getElementById('levelBadge').textContent = 'Easy';
  buildBoard();
  startTimer();
  document.getElementById('newBtn').onclick = init;
}

function buildBoard() {
  const bd = document.getElementById('board');
  bd.innerHTML = '';
  cards.forEach((icon, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = '?';
    card.dataset.idx = i;
    card.onclick = () => flipCard(i, card);
    bd.appendChild(card);
  });
}

function flipCard(idx, elem) {
  if (matched.has(idx) || flipped.includes(idx)) return;
  if (flipped.length >= 2) return;

  flipped.push(idx);
  elem.textContent = cards[idx];
  elem.classList.add('flipped');

  if (flipped.length === 2) {
    setTimeout(() => {
      moves++;
      document.getElementById('moves').textContent = moves + ' moves';

      if (cards[flipped[0]] === cards[flipped[1]]) {
        matched.add(flipped[0]);
        matched.add(flipped[1]);
        document.querySelectorAll(`.card[data-idx="${flipped[0]}"], .card[data-idx="${flipped[1]}"]`).forEach(c => {
          c.classList.add('matched');
          c.classList.remove('flipped');
        });
      } else {
        document.querySelectorAll('.card.flipped').forEach(c => {
          c.classList.remove('flipped');
          setTimeout(() => { c.textContent = '?'; }, 150);
        });
      }
      flipped = [];

      if (matched.size === cards.length) endGame();
    }, 600);
  }
}

function startTimer() {
  timerIntvl = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('timer').textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

function endGame() {
  clearInterval(timerIntvl);
  const time = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('resultScore').textContent = moves + ' moves in ' + time + 's';
  document.getElementById('resultText').textContent = moves < 18 ? 'Perfect memory!' : moves < 24 ? 'Nice job' : 'Keep practicing';
  document.getElementById('result').classList.add('show');
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

init();
</script>
</body>
</html>
