<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku — josho.pro/games</title>
<meta name="description" content="Constraint-generated daily sudoku. Easy, medium, hard.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --s1: #111115;
    --s2: #18181d;
    --border: rgba(255,255,255,0.07);
    --text: #f2f2f5;
    --dim: rgba(255,255,255,0.38);
    --accent: #8b5cf6;
    --green: #4ade80;
    --f: 'Inter', -apple-system, sans-serif;
    --cell-size: min(48px, calc((100vw - 48px) / 9));
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { background:var(--bg); color:var(--text); font-family:var(--f); -webkit-font-smoothing:antialiased; }
  body { min-height:100vh; padding:0 20px; }

  a.back { position:fixed; top:16px; left:16px; font-size:10px; color:var(--dim); text-decoration:none; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }

  #app { max-width:480px; margin:0 auto; }

  header {
    padding:20px 0 16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between;
  }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .hdr-title b { color:var(--text); }
  .hdr-right { display:flex; gap:8px; }
  .badge { padding:4px 10px; border-radius:6px; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.15); font-size:10px; font-weight:700; color:#c4b5fd; }

  .game-header { display:flex; justify-content:space-between; align-items:center; margin:16px 0; }
  .timer { font-family:monospace; font-size:12px; color:var(--dim); font-weight:700; }

  #grid {
    display:inline-grid; grid-template-columns:repeat(9, var(--cell-size)); gap:0;
    background:rgba(255,255,255,0.1); padding:1px; border-radius:8px; margin:20px auto; display:grid;
  }
  .cell {
    width:var(--cell-size); height:var(--cell-size);
    border:1px solid var(--border); background:var(--s1);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:800; cursor:pointer;
    user-select:none;
  }
  .cell:nth-child(3n) { border-right-width:2px; border-right-color:rgba(255,255,255,0.2); }
  .cell:nth-child(9n) { border-right:1px solid var(--border); }
  .cell:nth-child(n+19):nth-child(-n+27) { border-bottom-width:2px; border-bottom-color:rgba(255,255,255,0.2); }
  .cell.given { background:rgba(139,92,246,0.08); color:rgba(255,255,255,0.5); cursor:default; }
  .cell.selected { background:var(--accent); color:#fff; }
  .cell.conflict { background:#ef4444; color:#fff; }
  .cell.solved { background:var(--green); color:#000; }

  .controls { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0; }
  .btn { padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--s1); color:var(--text); font-size:11px; font-weight:700; cursor:pointer; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

  #keypad { display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; margin:16px 0; }
  .key { padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--s1); color:var(--text); font-size:12px; font-weight:700; cursor:pointer; }
  .key:hover { background:var(--s2); }
  .key.del { grid-column:span 3; }

  #result { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
    align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(10px); }
  #result.show { display:flex; }
  .result-card { background:var(--s1); border:1px solid var(--border); border-radius:16px; padding:32px 24px; max-width:340px; width:calc(100%-40px); text-align:center; }
  .result-title { font-size:20px; font-weight:900; color:var(--green); margin-bottom:12px; }
  .btn-close { width:100%; padding:12px; background:transparent; border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>
<a class="back" href="/games/">Back</a>
<div id="app">
  <header>
    <div class="hdr-title">josho.pro / <b>Sudoku</b></div>
    <div class="hdr-right">
      <div class="badge" id="diffBadge">Easy</div>
    </div>
  </header>

  <div class="game-header">
    <div class="timer" id="timer">0:00</div>
  </div>

  <div id="grid"></div>

  <div id="keypad"></div>

  <div class="controls">
    <button class="btn primary" id="newBtn">New Game</button>
    <button class="btn" id="checkBtn">Check</button>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-title">Puzzle Complete</div>
    <button class="btn-close" onclick="location.href='/games/'">Done</button>
  </div>
</div>

<script>
let board, userBoard, selected, startTime, timerIntvl, diff;

function init() {
  diff = ['easy','medium','hard'][Math.floor(Math.random()*3)];
  document.getElementById('diffBadge').textContent = diff.charAt(0).toUpperCase() + diff.slice(1);

  board = generateSudoku(diff === 'easy' ? 40 : diff === 'medium' ? 50 : 60);
  userBoard = board.map(r => [...r]);
  selected = null;
  startTime = Date.now();

  buildGrid();
  buildKeypad();
  startTimer();
  document.getElementById('newBtn').onclick = init;
  document.getElementById('checkBtn').onclick = checkSolution;
}

function generateSudoku(givens) {
  const b = Array(9).fill(0).map(() => Array(9).fill(0));
  fillDiagonal(b);
  fillRemainder(b, 0, 3);
  const puz = b.map(r => [...r]);
  let removed = 0;
  const cells = Array(81).fill(0).map((_,i) => i).sort(() => 0.5 - Math.random());
  for (const cell of cells) {
    if (removed >= 81 - givens) break;
    const r = Math.floor(cell / 9), c = cell % 9;
    const tmp = puz[r][c];
    puz[r][c] = 0;
    if (countSolutions(puz) === 1) removed++;
    else puz[r][c] = tmp;
  }
  return puz;
}

function fillDiagonal(b) {
  for (let box = 0; box < 9; box += 3) {
    const nums = [1,2,3,4,5,6,7,8,9].sort(() => 0.5 - Math.random());
    for (let i = 0; i < 9; i++) {
      b[box + Math.floor(i / 3)][box + i % 3] = nums[i];
    }
  }
}

function fillRemainder(b, row, col) {
  if (col >= 9) return fillRemainder(b, row + 1, 0);
  if (row >= 9) return true;
  if (row >= 3 && row % 3 === 0) col = 0;
  if (b[row][col] !== 0) return fillRemainder(b, row, col + 1);
  for (const n of [1,2,3,4,5,6,7,8,9].sort(() => 0.5 - Math.random())) {
    if (isValid(b, row, col, n)) {
      b[row][col] = n;
      if (fillRemainder(b, row, col + 1)) return true;
      b[row][col] = 0;
    }
  }
  return false;
}

function isValid(b, r, c, n) {
  for (let i = 0; i < 9; i++) {
    if (b[r][i] === n || b[i][c] === n) return false;
  }
  const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  for (let i = br; i < br + 3; i++)
    for (let j = bc; j < bc + 3; j++)
      if (b[i][j] === n) return false;
  return true;
}

function countSolutions(b, cnt = 0, limit = 2) {
  if (cnt > limit) return cnt;
  let r = -1, c = -1;
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++)
      if (b[i][j] === 0) { r = i; c = j; break; }
  if (r === -1) return cnt + 1;
  for (const n of [1,2,3,4,5,6,7,8,9]) {
    if (isValid(b, r, c, n)) {
      b[r][c] = n;
      cnt = countSolutions(b, cnt, limit);
      b[r][c] = 0;
    }
  }
  return cnt;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 81; i++) {
    const r = Math.floor(i / 9), c = i % 9;
    const cell = document.createElement('div');
    cell.className = 'cell' + (board[r][c] !== 0 ? ' given' : '');
    cell.textContent = board[r][c] || '';
    cell.dataset.r = r;
    cell.dataset.c = c;
    cell.onclick = () => selectCell(r, c, cell);
    grid.appendChild(cell);
  }
}

function buildKeypad() {
  const kp = document.getElementById('keypad');
  kp.innerHTML = '';
  for (let i = 1; i <= 9; i++) {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = i;
    key.onclick = () => setNumber(i);
    kp.appendChild(key);
  }
  const del = document.createElement('div');
  del.className = 'key del';
  del.textContent = 'Clear';
  del.onclick = () => setNumber(0);
  kp.appendChild(del);
}

function selectCell(r, c, elem) {
  if (board[r][c] !== 0) return;
  document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
  selected = { r, c };
  elem.classList.add('selected');
}

function setNumber(n) {
  if (!selected) return;
  userBoard[selected.r][selected.c] = n;
  document.querySelectorAll(`[data-r="${selected.r}"][data-c="${selected.c}"]`)[0].textContent = n || '';
}

function checkSolution() {
  let complete = true;
  for (let i = 0; i < 9; i++) {
    for (let j = 0; j < 9; j++) {
      if (userBoard[i][j] === 0) { complete = false; continue; }
      if (!isValid(userBoard, i, j, userBoard[i][j])) {
        document.querySelectorAll(`[data-r="${i}"][data-c="${j}"]`)[0].classList.add('conflict');
        complete = false;
      }
    }
  }
  if (complete && isSolvedCorrectly()) {
    clearInterval(timerIntvl);
    document.getElementById('result').classList.add('show');
  }
}

function isSolvedCorrectly() {
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++)
      if (userBoard[i][j] !== board[i][j]) return false;
  return true;
}

function startTimer() {
  timerIntvl = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('timer').textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

init();
</script>
</body>
</html>
