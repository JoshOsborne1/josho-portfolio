<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guldmann UK Compliance Audit</title>
<style>
:root {
  --bg: #F7F8FA;
  --bg-white: #FFFFFF;
  --text: #111111;
  --text-2: #555555;
  --text-3: #888888;
  --border: #E4E6EA;
  --dark: #111111;
  --dark-2: #1A1A1A;
  --dark-card: #1E1E1E;
  --yellow: #F4B626;
  --yellow-dim: rgba(244,182,38,0.12);
  --red: #DC2626;
  --red-dim: rgba(220,38,38,0.1);
  --red-text: #B91C1C;
  --orange: #EA580C;
  --orange-dim: rgba(234,88,12,0.1);
  --orange-text: #C2410C;
  --green: #16A34A;
  --green-dim: rgba(22,163,74,0.1);
  --green-text: #15803D;
  --on-dark: #F0F0F0;
  --muted-dark: #888;
  --nav-h: 56px;
  --sidebar-w: 320px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
nav{height:var(--nav-h);background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;flex-shrink:0;z-index:100}
.nav-brand{font-size:12px;letter-spacing:3px;font-weight:800;color:var(--yellow);text-transform:uppercase;flex-shrink:0}
.nav-divider{width:1px;height:20px;background:rgba(255,255,255,0.1)}
.nav-title{font-size:13px;color:#999;font-weight:500;flex:1}
.nav-pills{display:flex;gap:6px;flex-shrink:0}
.nav-pill{font-size:10px;font-weight:700;letter-spacing:0.5px;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.np-red{background:rgba(220,38,38,0.2);color:#F87171;border:1px solid rgba(220,38,38,0.3)}
.np-orange{background:rgba(234,88,12,0.15);color:#FB923C;border:1px solid rgba(234,88,12,0.25)}
.np-green{background:rgba(22,163,74,0.15);color:#4ADE80;border:1px solid rgba(22,163,74,0.25)}

/* BODY LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:1rem 1rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#AAA;pointer-events:none}
.sidebar-search{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color 150ms}
.sidebar-search:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(244,182,38,0.1)}
.filter-tabs{display:flex;gap:4px;margin-top:8px}
.ftab{flex:1;padding:5px 0;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#FFF;color:var(--text-3);transition:all 120ms;text-align:center}
.ftab:hover{background:var(--bg)}
.ftab.active{background:var(--text);color:#FFF;border-color:var(--text)}
.ftab.fr.active{background:var(--red);border-color:var(--red)}
.ftab.fo.active{background:var(--orange);border-color:var(--orange)}
.ftab.fg.active{background:var(--green);border-color:var(--green)}
.sidebar-count{font-size:10px;color:var(--text-3);margin-top:8px;font-weight:600;letter-spacing:0.3px}

/* SIDEBAR LIST */
.sidebar-list{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:#DDD;border-radius:2px}

.s-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:background 120ms,border-color 120ms;position:relative}
.s-item:hover{background:#F9FAFB}
.s-item.active{background:#FFFEF5;border-left-color:var(--yellow)}
.s-item.active.red{background:#FFF9F9;border-left-color:var(--red)}
.s-item.active.orange{background:#FFF7F5;border-left-color:var(--orange)}
.s-item.active.green{background:#F9FFF9;border-left-color:var(--green)}

.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.s-dot.red{background:var(--red)}
.s-dot.orange{background:var(--orange)}
.s-dot.green{background:var(--green)}

.s-content{flex:1;min-width:0}
.s-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:2px}
.s-sub{font-size:11px;color:var(--text-3);font-weight:500}
.s-item.hidden{display:none}

/* MAIN PANEL */
.main{flex:1;overflow-y:auto;padding:0}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-3);gap:8px;padding:2rem;text-align:center}
.empty-icon{font-size:2rem;opacity:0.4}
.empty-state p{font-size:14px}

/* DETAIL VIEW */
.detail{max-width:820px;margin:0 auto;padding:2.5rem 2rem 4rem}

.detail-header{background:var(--dark);border-radius:14px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.detail-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow)}
.detail-header.red::before{background:var(--red)}
.detail-header.orange::before{background:var(--orange)}
.detail-header.green::before{background:var(--green)}

.dh-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-dark);margin-bottom:0.5rem}
.dh-title{font-size:1.5rem;font-weight:700;color:var(--on-dark);line-height:1.2;margin-bottom:1rem;letter-spacing:-0.02em}
.dh-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.d-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.d-badge.red{background:rgba(220,38,38,0.2);border:1px solid rgba(220,38,38,0.35);color:#F87171}
.d-badge.orange{background:rgba(234,88,12,0.15);border:1px solid rgba(234,88,12,0.3);color:#FB923C}
.d-badge.green{background:rgba(22,163,74,0.15);border:1px solid rgba(22,163,74,0.3);color:#4ADE80}
.d-badge.yellow{background:rgba(244,182,38,0.12);border:1px solid rgba(244,182,38,0.3);color:var(--yellow)}

/* TWO COLUMN BLOCKS */
.detail-split{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:640px){.detail-split{grid-template-columns:1fr}}

.detail-block{background:var(--bg-white);border:1px solid var(--border);border-radius:12px;padding:1.25rem;height:100%}
.detail-block.wrong{border-color:rgba(220,38,38,0.25);background:#FFFBFB}
.detail-block.wrong .db-label{color:var(--red-text)}
.detail-block.right{border-color:rgba(22,163,74,0.25);background:#F9FFF9}
.detail-block.right .db-label{color:var(--green-text)}
.detail-block.neutral{border-color:var(--border)}
.detail-block.law{border-color:rgba(37,99,235,0.2);background:#F8FAFF}
.detail-block.law .db-label{color:#1D4ED8}

.db-icon{font-size:1.1rem;margin-bottom:0.6rem}
.db-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.5rem;display:block}
.db-text{font-size:13.5px;line-height:1.7;color:var(--text-2)}
.db-text strong{color:var(--text);font-weight:600}
.quote{border-left:3px solid var(--border);padding-left:10px;font-style:italic;color:#999;font-size:13px;line-height:1.6;margin-top:8px}
.detail-block.wrong .quote{border-left-color:rgba(220,38,38,0.35)}

/* FULL WIDTH BLOCK */
.detail-block.full{margin-bottom:1rem}

/* LAW LINKS */
.law-links{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.law-link{color:#2563EB;text-decoration:none;font-size:12.5px;display:inline-flex;align-items:center;gap:5px}
.law-link:hover{text-decoration:underline}
.law-link::before{content:'↗';font-size:10px;opacity:0.6}

/* COMPLIANT BLOCK */
.detail-block.compliant-full{border-color:rgba(22,163,74,0.3);background:#F0FDF4}

/* NAV ARROWS */
.detail-nav{display:flex;justify-content:space-between;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);gap:1rem}
.dnav-btn{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:#FFF;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-2);transition:all 150ms;text-align:center;display:flex;flex-direction:column;gap:2px;max-width:48%}
.dnav-btn:hover{border-color:var(--yellow);color:var(--text);background:#FFFEF5}
.dnav-btn .dnav-dir{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-3)}
.dnav-btn .dnav-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dnav-btn:disabled{opacity:0.35;cursor:default;pointer-events:none}
.dnav-btn.right{text-align:right}

/* OVERVIEW PANEL */
.overview{padding:2.5rem 2rem 4rem;max-width:900px;margin:0 auto}
.ov-title{font-size:1.75rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem}
.ov-sub{color:var(--text-2);font-size:14px;margin-bottom:2rem;line-height:1.7}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:2.5rem}
.stat-box{background:var(--dark);border-radius:12px;padding:1.25rem;border-top:3px solid var(--yellow);position:relative;overflow:hidden}
.stat-box.red{border-top-color:var(--red)}
.stat-box.orange{border-top-color:var(--orange)}
.stat-box.green{border-top-color:var(--green)}
.stat-n{font-size:2rem;font-weight:800;color:#FFF;letter-spacing:-0.04em;line-height:1}
.stat-box.red .stat-n{color:#FCA5A5}
.stat-box.orange .stat-n{color:#FDBA74}
.stat-box.green .stat-n{color:#86EFAC}
.stat-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted-dark);margin-top:5px}

.ov-verdict{background:var(--red);border-radius:12px;padding:1.25rem 1.5rem;color:#FFF;margin-bottom:2rem}
.ov-verdict h3{font-size:14px;font-weight:700;margin-bottom:4px;opacity:0.85;text-transform:uppercase;letter-spacing:1px}
.ov-verdict p{font-size:14px;line-height:1.6;opacity:0.9}

.ov-section{margin-bottom:2rem}
.ov-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3);margin-bottom:10px}
.quick-list{list-style:none;display:flex;flex-direction:column;gap:3px}
.ql-item{display:flex;align-items:baseline;gap:10px;padding:7px 10px;border-radius:8px;background:#FFF;border:1px solid var(--border);cursor:pointer;transition:all 100ms}
.ql-item:hover{border-color:#DDD;background:#F9FAFB}
.ql-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:1px}
.ql-dot.red{background:var(--red)}
.ql-dot.orange{background:var(--orange)}
.ql-dot.green{background:var(--green)}
.ql-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.ql-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px}
.ql-tag.red{color:var(--red-text)}
.ql-tag.orange{color:var(--orange-text)}
.ql-tag.green{color:var(--green-text)}

.disclaimer{font-size:11.5px;color:var(--text-3);line-height:1.7;background:#FFF;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-top:2rem}

@media(max-width:768px){
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:260px}
  .app-body{flex-direction:column}
  .detail,.overview{padding:1.5rem 1rem 3rem}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Guldmann</div>
  <div class="nav-divider"></div>
  <div class="nav-title">UK Employment Law Compliance Audit - 2 March 2026</div>
  <div class="nav-pills">
    <span class="nav-pill np-red">6 Non-Compliant</span>
    <span class="nav-pill np-orange">11 Amendments</span>
    <span class="nav-pill np-green">5 Compliant</span>
  </div>
</nav>

<div class="app-body">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="sidebar-search" placeholder="Search sections..." id="sidebarSearch" oninput="filterSidebar()">
      </div>
      <div class="filter-tabs">
        <div class="ftab active" onclick="setSidebarFilter('all',this)">All</div>
        <div class="ftab fr" onclick="setSidebarFilter('red',this)">Issues</div>
        <div class="ftab fo" onclick="setSidebarFilter('orange',this)">Amend</div>
        <div class="ftab fg" onclick="setSidebarFilter('green',this)">OK</div>
      </div>
      <div class="sidebar-count" id="sidebarCount">25 sections</div>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <!-- overview -->
      <div class="s-item active" id="si-overview" onclick="showOverview()" data-color="" data-text="overview summary audit">
        <div class="s-dot" style="background:var(--yellow)"></div>
        <div class="s-content">
          <div class="s-name">Audit Overview</div>
          <div class="s-sub">Summary and statistics</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainPanel">
    <!-- Overview renders here by default -->
  </div>
</div>

<script>
// DATA
const sections = [
  {
    id: 'values',
    name: 'Values and Introduction',
    status: 'green',
    statusLabel: 'Compliant',
    law: [],
    wrong: null,
    right: null,
    issue: null,
    amendment: null,
    note: 'FACT values (Flexibility, Ambition, Competence, Trustworthiness) and general culture statements carry no legal compliance risk. The tone and content are appropriate and unobjectionable for UK employees.',
    compliantNote: true
  },
  {
    id: 'code-of-conduct',
    name: 'Code of Conduct',
    status: 'orange',
    statusLabel: 'Needs Amendment',
    law: [
      {name:'Bribery Act 2010',url:'https://www.legislation.gov.uk/ukpga/2010/23/contents'},
      {name:'Modern Slavery Act 2015',url:'https://www.legislation.gov.uk/ukpga/2015/30/contents'},
      {name:'Equality Act 2010',url:'https://www.legislation.gov.uk/ukpga/2010/15/contents'}
    ],
    wrong: 'No reference to the Bribery Act 2010, Modern Slavery Act 2015, or Equality Act 2010. A UK-facing Code of Conduct is incomplete without these three statutes.',
    right: 'Add anti-corruption statement referencing the Bribery Act 2010. Add Modern Slavery Act 2015 supply chain transparency statement (required if turnover exceeds £36m). Add Equality Act 2010 non-discrimination commitment covering all 9 protected characteristics.'
  },
  {
    id: 'it-security',
    name: 'IT and Security Policy',
    status: 'orange',
    statusLabel: 'Needs Amendment',
    law: [
      {name:'ICO Data Protection Guide',url:'https://ico.org.uk/for-organisations/guide-to-data-protection/'},
      {name:'UK GDPR - ICO',url:'https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/'}
    ],
    wrong: 'Policy content is not included or linked - only a placeholder. No explicit reference to UK GDPR obligations for data security. Employees cannot access the policy from the handbook.',
    right: 'Insert a working link to the full IT security policy (intranet/SharePoint). Add reference to Data Protection Act 2018 and UK GDPR, enforced by the ICO. Replace all "[insert link]" placeholders with live URLs.'
  },
  {
    id: 'gdpr',
    name: 'Personal Data Protection (GDPR)',
    status: 'orange',
    statusLabel: 'Needs Amendment',
    law: [
      {name:'Data Protection Act 2018',url:'https://www.legislation.gov.uk/ukpga/2018/12/contents'},
      {name:'ICO UK GDPR Guidance',url:'https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/'}
    ],
    quote: '"We handle personal data responsibly and in accordance with the law, including GDPR."',
    wrong: 'References EU GDPR. Post-Brexit, the UK GDPR (Data Protection Act 2018) is the applicable law in the UK - EU GDPR has no force here. The UK employee privacy notice placeholder was never completed. No ICO reference. Employee data subject rights are not listed anywhere.',
    right: 'Change all "GDPR" references to "UK GDPR / Data Protection Act 2018". Insert the actual UK employee privacy notice. State that the ICO (ico.org.uk) is the supervisory authority. List employee rights: Subject Access Request (SAR), right to erasure, right to rectification. Reference the 72-hour breach reporting obligation to the ICO.'
  },
  {
    id: 'special-occasions',
    name: 'Anniversary Gifts / Special Occasions',
    status: 'red',
    statusLabel: 'Non-Compliant',
    law: [
      {name:'HMRC Long Service Awards',url:'https://www.gov.uk/guidance/long-service-awards-490-chapter-5'},
      {name:'HMRC Trivial Benefits',url:'https://www.gov.uk/expenses-and-benefits/trivial-benefits'}
    ],
    quote: 'Gifts of 700 DKK (10-year anniversary), 500 DKK (retirement/apprenticeship). 25-year: one month\'s salary.',
    wrong: 'All monetary amounts are in DKK - inapplicable to UK employees. "One month\'s salary" is a cash payment and is therefore taxable employment income - it must go through PAYE. Non-cash gifts must comply with HMRC\'s long-service award exemption rules, which the handbook makes no mention of.',
    right: 'Convert all amounts to GBP. Process any cash or salary-based payments through payroll (PAYE applies). For non-cash gifts: the HMRC long-service award exemption allows up to £50 per year of service, for 20+ years service, in non-cash form only. Gifts under £50 that are not cash and not contractual may qualify as trivial benefits (HMRC EIM01460).'
  },
  {
    id: 'time-registration',
    name: 'Time Registration / Absence Reporting',
    status: 'orange',
    statusLabel: 'Needs Amendment',
    law: [
      {name:'Working Time Regulations 1998',url:'https://www.legislation.gov.uk/uksi/1998/1833/contents'}
    ],
    wrong: 'The policy references Azets Cozone (a Danish HR platform). It also references "Statistics Denmark" reporting obligations - which have no UK equivalent and are irrelevant to UK employees. Danish administrative structures are used throughout.',
    right: 'Replace Azets Cozone with whatever HR system Guldmann UK uses. Remove all Statistics Denmark references. Add a brief note referencing the Working Time Regulations 1998 reg.9 record-keeping obligation (employers must keep adequate records to show WTR compliance).'
  },
  {
    id: 'remote-work',
    name: 'Remote Working / Flexible Working',
    status: 'orange',
    statusLabel: 'Needs Amendment',
    law: [
      {name:'Employment Relations (Flexible Working) Act 2023',url:'https://www.legislation.gov.uk/ukpga/2023/33/contents'},
      {name:'ACAS Flexible Working',url:'https://www.acas.org.uk/flexible-working'},
      {name:'DSE Regulations 1992',url:'https://www.legislation.gov.uk/uksi/1992/2792/contents'}
    ],
    wrong: 'The statutory right to request flexible working from day 1 of employment (in force since 6 April 2024) is not mentioned anywhere. The policy presents flexible working as entirely at management discretion, which misrepresents the legal position. No DSE workstation assessment obligation for home workers.',
    right: 'Add: employees have a statutory day 1 right to request flexible working under the Employment Relations (Flexible Working) Act 2023. Guldmann must respond within 2 months. Employees may make 2 requests per year. There are only 8 permitted grounds for refusal. Add DSE assessment entitlement for anyone regularly working from home (employer\'s cost).'
  },
  {
    id: 'holiday',
    name: 'Holiday / Annual Leave',
    status: 'red',
    statusLabel: 'Non-Compliant',
    law: [
      {name:'Working Time Regulations 1998',url:'https://www.legislation.gov.uk/uksi/1998/1833/contents'},
      {name:'ACAS Holiday Guide',url:'https://www.acas.org.uk/holiday-entitlement-and-pay'}
    ],
    quote: '"A minimum of 20 days must be taken per vacation year (according to the EU Holiday Act). Earning year: 1 September - 31 August." / "5 June (Constitution Day) - day off for all."',
    wrong: 'The EU Holiday Act has no force in the UK post-Brexit. The Danish vacation year (1 Sept - 31 Aug) is not UK law. The statutory minimum in the UK is 28 days (5.6 weeks), not the 20 days implied. Danish national holidays are listed (5 June Constitution Day, 1 May). The placeholder "[insert national/state vacation rules]" was never completed for the UK.',
    right: 'Replace entirely with the UK WTR 1998 position: 5.6 weeks (28 days for a full-time employee) including bank holidays. Use a UK holiday year (typically 1 Jan - 31 Dec or 1 Apr - 31 Mar). Holiday pay must be based on 52 weeks average of normal earnings (including regular overtime, commission). Replace the Danish public holiday list with the 8 UK bank holidays for England and Wales.'
  },
  {
    id: 'sick-leave',
    name: 'Sick Leave and Absence',
    status: 'red',
    statusLabel: 'Non-Compliant',
    law: [
      {name:'GOV.UK - Statutory Sick Pay',url:'https://www.gov.uk/employers-sick-pay'},
      {name:'Employment Rights Act 2025 (day 1 SSP)',url:'https://www.legislation.gov.uk/ukpga/2025/15/contents'},
      {name:'Equality Act 2010 - Reasonable Adjustments',url:'https://www.legislation.gov.uk/ukpga/2010/15/section/20'}
    ],
    quote: '"Once we have reported your absence, the municipality will send you an information form..." / Danish text: "Alt sygefravaer registreres som led i vores arbejdsmiljoindsats"',
    wrong: 'The Danish municipal sickness benefit system is described as if it applies to UK employees. It does not - there is no UK equivalent. Statutory Sick Pay (SSP) is not mentioned at all. From April 2026, SSP is payable from day 1 under the Employment Rights Act 2025 (ending the 3-day waiting period). Danish text appears untranslated in the document. No reference to Equality Act 2010 reasonable adjustments for disability-related absence.',
    right: 'Remove all Danish municipal references. Add SSP: currently £116.75/week for up to 28 weeks. From April 2026, SSP is payable from day 1 (no waiting period). Add: a GP fit note is required after 7 consecutive calendar days of absence. Add an Equality Act 2010 section: for employees whose absence is disability-related, Guldmann will consider reasonable adjustments before taking any absence management action. Translate or remove all untranslated Danish text.'
  },
  {
    id: 'sickness-holiday',
    name: 'Sickness During Annual Leave',
    status: 'red',
    statusLabel: 'Non-Compliant',
    law: [
      {name:'Working Time Regulations 1998 s.13',url:'https://www.legislation.gov.uk/uksi/1998/1833/regulation/13'},

let activeSectionId = null;
let sidebarFilter = 'all';

function statusColor(s) {
  return s === 'red' ? 'red' : s === 'orange' ? 'orange' : 'green';
}
function statusLabel(s) {
  return s === 'red' ? 'Non-Compliant' : s === 'orange' ? 'Needs Amendment' : 'Compliant';
}

// Build sidebar
function buildSidebar() {
  const list = document.getElementById('sidebarList');
  sections.forEach((sec, idx) => {
    const el = document.createElement('div');
    el.className = 's-item';
    el.id = 'si-' + sec.id;
    el.dataset.color = sec.status;
    el.dataset.text = (sec.name + ' ' + sec.statusLabel).toLowerCase();
    el.onclick = () => showSection(sec.id);
    el.innerHTML = `
      <div class="s-dot ${sec.status}"></div>
      <div class="s-content">
        <div class="s-name">${sec.name}</div>
        <div class="s-sub">${sec.statusLabel}</div>
      </div>`;
    list.appendChild(el);
  });
  updateCount();
}

function setSidebarFilter(f, btn) {
  sidebarFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterSidebar();
}

function filterSidebar() {
  const q = document.getElementById('sidebarSearch').value.toLowerCase();
  let count = 0;
  document.querySelectorAll('.s-item').forEach(el => {
    if(el.id === 'si-overview') { el.classList.toggle('hidden', false); return; }
    const matchFilter = sidebarFilter === 'all' || el.dataset.color === sidebarFilter;
    const matchSearch = !q || el.dataset.text.includes(q);
    const show = matchFilter && matchSearch;
    el.classList.toggle('hidden', !show);
    if(show) count++;
  });
  updateCount(count);
}

function updateCount(n) {
  const total = n !== undefined ? n : sections.length;
  document.getElementById('sidebarCount').textContent = total + (n === undefined ? ' sections' : ' of ' + sections.length + ' sections');
}

function setActive(id) {
  document.querySelectorAll('.s-item').forEach(el => {
    el.classList.remove('active', 'red', 'orange', 'green');
  });
  const el = document.getElementById('si-' + id);
  if(el) {
    el.classList.add('active');
    const color = el.dataset.color;
    if(color) el.classList.add(color);
    el.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function showOverview() {
  activeSectionId = null;
  setActive('overview');
  const panel = document.getElementById('mainPanel');

  const redSections = sections.filter(s => s.status === 'red');
  const orangeSections = sections.filter(s => s.status === 'orange');
  const greenSections = sections.filter(s => s.status === 'green');

  const makeList = (arr) => arr.map((s,i) => `
    <li class="ql-item" onclick="showSection('${s.id}')">
      <div class="ql-dot ${s.status}"></div>
      <span class="ql-name">${s.name}</span>
      <span class="ql-tag ${s.status}">${statusLabel(s.status)}</span>
    </li>`).join('');

  panel.innerHTML = `
    <div class="overview">
      <div class="ov-title">UK Compliance Audit</div>
      <div class="ov-sub">Guldmann Employee Handbook reviewed against current UK employment law. 25 sections assessed. Audit completed 2 March 2026 by Atlas AI Research and Rox Orchestrator.</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-n">25</div><div class="stat-l">Sections Reviewed</div></div>
        <div class="stat-box red"><div class="stat-n">${redSections.length}</div><div class="stat-l">Non-Compliant</div></div>
        <div class="stat-box orange"><div class="stat-n">${orangeSections.length}</div><div class="stat-l">Needs Amendment</div></div>
        <div class="stat-box green"><div class="stat-n">${greenSections.length}</div><div class="stat-l">Broadly Compliant</div></div>
        <div class="stat-box red"><div class="stat-n">10</div><div class="stat-l">Critical Issues</div></div>
        <div class="stat-box red"><div class="stat-n">12+</div><div class="stat-l">Unfilled Placeholders</div></div>
      </div>
      <div class="ov-verdict">
        <h3>Overall Verdict</h3>
        <p>NOT FIT FOR UK USE WITHOUT MAJOR AMENDMENT. The handbook was written for the Danish and Norwegian market. It has been partially translated into English but has never been localised for UK employment law. Distributing it to UK employees in its current state creates significant legal risk across at least 6 areas.</p>
      </div>
      <div class="ov-section">
        <h3>Non-Compliant Sections - Action Required</h3>
        <ul class="quick-list">${makeList(redSections)}</ul>
      </div>
      <div class="ov-section">
        <h3>Sections Needing Amendment</h3>
        <ul class="quick-list">${makeList(orangeSections)}</ul>
      </div>
      <div class="ov-section">
        <h3>Broadly Compliant</h3>
        <ul class="quick-list">${makeList(greenSections)}</ul>
      </div>
      <div class="disclaimer">
        <strong>Notice:</strong> This audit was conducted by Atlas AI Research / Rox AI Orchestrator on 2 March 2026. It is provided for guidance and information purposes only and does not constitute legal advice. Guldmann should seek advice from a qualified UK employment solicitor before distributing any updated version of this handbook to UK employees. Statutory rates and legislation referenced were current as of the audit date and may change.
      </div>
    </div>`;
}

function showSection(id) {
  const idx = sections.findIndex(s => s.id === id);
  if(idx === -1) return;
  activeSectionId = id;
  setActive(id);
  const sec = sections[idx];
  const prev = idx > 0 ? sections[idx-1] : null;
  const next = idx < sections.length-1 ? sections[idx+1] : null;
  const color = statusColor(sec.status);

  let bodyHtml = '';

  if(sec.compliantNote) {
    bodyHtml = `<div class="detail-block compliant-full full"><div class="db-icon">✅</div><div class="db-label" style="color:var(--green-text)">Assessment</div><div class="db-text">${sec.note}</div></div>`;
  } else {
    if(sec.quote) {
      bodyHtml += `<div class="detail-block neutral full"><div class="db-label">Current Handbook Text</div><div class="quote">${sec.quote}</div></div>`;
    }
    bodyHtml += `<div class="detail-split">
      <div class="detail-block wrong">
        <div class="db-icon">✗</div>
        <div class="db-label">What Is Wrong</div>
        <div class="db-text">${sec.wrong}</div>
      </div>
      <div class="detail-block right">
        <div class="db-icon">✓</div>
        <div class="db-label">What Should Be There</div>
        <div class="db-text">${sec.right}</div>
      </div>
    </div>`;
    if(sec.law && sec.law.length > 0) {
      bodyHtml += `<div class="detail-block law full"><div class="db-label">Relevant Legislation</div><div class="law-links">${sec.law.map(l=>`<a class="law-link" href="${l.url}" target="_blank" rel="noopener">${l.name}</a>`).join('')}</div></div>`;
    }
  }

  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="detail">
      <div class="detail-header ${color}">
        <div class="dh-label">Section ${idx+1} of ${sections.length}</div>
        <div class="dh-title">${sec.name}</div>
        <div class="dh-badges">
          <span class="d-badge ${color}">${sec.statusLabel}</span>
          ${sec.law && sec.law.length > 0 ? `<span class="d-badge yellow">${sec.law.length} legislation reference${sec.law.length > 1 ? 's' : ''}</span>` : ''}
        </div>
      </div>
      ${bodyHtml}
      <div class="detail-nav">
        <button class="dnav-btn" onclick="${prev ? `showSection('${prev.id}')` : ''}" ${!prev ? 'disabled' : ''}>
          <span class="dnav-dir">&#8592; Previous</span>
          <span class="dnav-name">${prev ? prev.name : ''}</span>
        </button>
        <button class="dnav-btn right" onclick="${next ? `showSection('${next.id}')` : ''}" ${!next ? 'disabled' : ''}>
          <span class="dnav-dir">Next &#8594;</span>
          <span class="dnav-name">${next ? next.name : ''}</span>
        </button>
      </div>
    </div>`;
  panel.scrollTo({top:0,behavior:'smooth'});
}

// Init
buildSidebar();
showOverview();
</script>
