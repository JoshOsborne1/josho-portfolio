<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Word Chain</title>
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --yellow: #eab308;
      --green: #22c55e;
      --blue: #3b82f6;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container { max-width: 500px; width: 100%; padding: 20px; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 20px;
    }
    .streak { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .streak .flame { color: #f97316; font-size: 1.4em; }
    
    .ad-banner {
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .ad-top { width: 100%; height: 90px; }
    .ad-bottom { width: 100%; height: 90px; margin-top: 20px; }
    
    .game-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    
    h1 { font-size: 28px; margin-bottom: 10px; }
    .instructions { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
    
    .mistakes { margin-bottom: 20px; font-size: 14px; }
    .mistakes-row { display: flex; gap: 6px; justify-content: center; }
    .x-mark { color: #ef4444; font-size: 20px; }
    
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .tile {
      aspect-ratio: 1;
      background: #4b5563;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      user-select: none;
    }
    .tile:hover { background: #6b7280; }
    .tile.selected { background: var(--primary); transform: scale(0.95); }
    .tile.solved { pointer-events: none; }
    .tile.yellow { background: var(--yellow); color: #000; }
    .tile.green { background: var(--green); color: #000; }
    .tile.blue { background: var(--blue); color: #fff; }
    .tile.purple { background: var(--purple); color: #fff; }
    
    .solved-groups { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .solved-group {
      background: var(--green);
      color: #000;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
    }
    .solved-group .category { font-size: 12px; text-transform: uppercase; opacity: 0.8; }
    .solved-group .words { font-size: 16px; }
    
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #4b5563; }
    
    .premium-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      z-index: 100;
      cursor: pointer;
    }
    .premium-badge.active { display: none; }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .modal h2 { margin-bottom: 15px; color: var(--primary); }
    .modal p { color: var(--muted); margin-bottom: 20px; }
    .modal input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }
    .modal .btn-group { display: flex; gap: 10px; justify-content: center; }
    
    .hidden { display: none !important; }
    
    .results-emoji { font-size: 48px; margin: 20px 0; }
  </style>

<style>
  :root {
    --bg-void: #0a0a0a;
    --bg-surface: #111111;
    --border-dim: rgba(255,255,255,0.07);
    --text-main: #f4f4f5;
    --text-dim: #a1a1aa;
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
  }
  
  body {
    background-color: var(--bg-void) !important;
    color: var(--text-main) !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .premium-btn, button {
    background-color: var(--accent) !important;
    color: #fff !important;
    border: none !important;
    border-radius: 8px !important;
    transition: transform 0.15s ease, background-color 0.15s ease !important;
  }
  
  .premium-btn:hover, button:hover {
    background-color: var(--accent-hover) !important;
    transform: scale(1.02) !important;
  }

  .premium-btn:active, button:active {
    transform: scale(0.98) !important;
  }

  .game-container, .modal {
    background-color: var(--bg-surface) !important;
    border: 1px solid var(--border-dim) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
  }

  a { color: var(--accent) !important; text-decoration: none !important; }
  a:hover { text-decoration: underline !important; }

  /* Smooth tile/cell transitions */
  .tile, .cell, .card {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease !important;
  }
  
  /* Mobile padding safe areas */
  @media (max-width: 600px) {
    body { padding-bottom: env(safe-area-inset-bottom, 20px) !important; }
  }
</style>

</head>
<body>
  <div class="premium-badge" id="premiumBadge">UPGRADE</div>
  
  <div class="container">
    <header>
      <h1>Word Chain</h1>
      <div class="streak">
        <span class="flame">🔥</span>
        <span id="streakCount">0</span>
      </div>
    </header>
    
    <div class="ad-top ad-banner">[AdSense 728x90]</div>
    
    <div class="game-card">
      <h1>Daily Word Chain</h1>
      <p class="instructions">Create groups of four!</p>
      
      <div class="mistakes">
        Mistakes remaining: <span id="mistakesLeft">4</span>
        <div class="mistakes-row" id="mistakesRow">
          <span class="x-mark">X</span><span class="x-mark">X</span><span class="x-mark">X</span><span class="x-mark">X</span>
        </div>
      </div>
      
      <div class="solved-groups" id="solvedGroups"></div>
      
      <div class="grid" id="grid"></div>
      
      <div class="controls">
        <button class="btn btn-secondary" id="shuffleBtn" onclick="shuffleTiles()">Shuffle</button>
        <button class="btn" id="submitBtn" onclick="submitGuess()" disabled>Submit</button>
        <button class="btn btn-secondary" id="deselectBtn" onclick="deselectAll()" disabled>Deselect</button>
      </div>
    </div>
    
    <div class="ad-bottom ad-banner">[AdSense 728x90]</div>
  </div>
  
  <!-- Results Modal -->
  <div class="modal-overlay hidden" id="resultModal">
    <div class="modal">
      <h2 id="resultTitle">You Win!</h2>
      <div class="results-emoji" id="resultEmoji"></div>
      <p id="resultMessage"></p>
      <button class="btn" onclick="shareResult()">Share Result</button>
    </div>
  </div>
  
  <!-- Email Modal -->
  <div class="modal-overlay hidden" id="emailModal">
    <div class="modal">
      <h2>Get Tomorrow's Puzzle!</h2>
      <p>Never miss a daily word challenge. Subscribe free.</p>
      <input type="email" id="emailInput" placeholder="your@email.com">
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="dismissEmail(24)">Not now</button>
        <button class="btn" onclick="subscribeEmail()">Subscribe</button>
      </div>
    </div>
  </div>
  
  <!-- Premium Modal -->
  <div class="modal-overlay hidden" id="premiumModal">
    <div class="modal">
      <h2>Go Premium</h2>
      <p>Remove ads, unlock Hard Mode, and get unlimited hints!</p>
      <p style="font-size: 24px; font-weight: 700; color: var(--primary);">$3.99/month</p>
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="closePremiumModal()">Later</button>
        <button class="btn" onclick="upgradePremium()">Upgrade</button>
      </div>
    </div>
  </div>

  <script>

      ]},

        { words: ["PAIN", "GAIN", "LOSS", "WIN"], category: "OUTCOMES", color: "blue" },
        { words: ["MAN", "WOMAN", "BOY", "GIRL"], category: "PEOPLE", color: "purple" }
      ]},
      // Day 18
      { groups: [
        { words: ["HEART", "SOUL", "MIND", "BODY"], category: "PERSON", color: "yellow" },
        { words: ["LAKE", "POND", "POOL", "SEA"], category: "WATER", color: "green" },
        { words: ["WILD", "TAME", "FERAL", "DOMESTIC"], category: "ANIMALS", color: "blue" },
        { words: ["FIRE", "WATER", "EARTH", "AIR"], category: "ELEMENTS", color: "purple" }
      ]},
      // Day 19
      { groups: [
        { words: ["STORY", "BOOK", "READ", "WORD"], category: "LITERACY", color: "yellow" },
        { words: ["JUMP", "DANCE", "RUN", "WALK"], category: "ACTION", color: "green" },
        { words: ["TREE", "LEAF", "ROOT", "STEM"], category: "PLANTS", color: "blue" },
        { words: ["ROCK", "STONE", "PEBBLE", "BOULDER"], category: "ROCKS", color: "purple" }
      ]},
      // Day 20
      { groups: [
        { words: ["MONEY", "CASH", "COIN", "NOTE"], category: "CURRENCY", color: "yellow" },
        { words: ["FAST", "QUICK", "SLOW", "RAPID"], category: "SPEED", color: "green" },
        { words: ["SHEEP", "GOAT", "LAMB", "KID"], category: "GOAT FAMILY", color: "blue" },
        { words: ["BLUE", "SKY", "OCEAN", "WATER"], category: "BLUE THINGS", color: "purple" }
      ]}
    ];

    let currentPuzzle, availableWords, solvedGroups, mistakes, isPremium = false;

    function getTodayPuzzle() {
      const today = new Date();
      const dayOfMonth = today.getDate();
      return PUZZLES[(dayOfMonth - 1) % PUZZLES.length];
    }

    function init() {
      // Premium check
      isPremium = localStorage.getItem('isPremium') === 'true';
      if (isPremium) {
        document.getElementById('premiumBadge').classList.add('active');
        document.querySelectorAll('.ad-banner').forEach(ad => ad.classList.add('hidden'));
      }

      // Load streak
      const streak = parseInt(localStorage.getItem('wordChainStreak') || '0');
      document.getElementById('streakCount').textContent = streak;

      // Load puzzle
      currentPuzzle = getTodayPuzzle();
      availableWords = currentPuzzle.groups.flatMap(g => g.words);
      solvedGroups = [];
      mistakes = 4;

      renderGrid();
      updateMistakesDisplay();
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      availableWords.forEach(word => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = word;
        tile.dataset.word = word;
        tile.onclick = () => toggleTile(tile);
        grid.appendChild(tile);
      });
    }

    function toggleTile(tile) {
      if (tile.classList.contains('solved')) return;
      
      tile.classList.toggle('selected');
      updateButtons();
    }

    function updateButtons() {
      const selected = document.querySelectorAll('.tile.selected');
      const submitBtn = document.getElementById('submitBtn');
      const deselectBtn = document.getElementById('deselectBtn');
      
      submitBtn.disabled = selected.length !== 4;
      deselectBtn.disabled = selected.length === 0;
    }

    function deselectAll() {
      document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
      updateButtons();
    }

    function shuffleTiles() {
      const grid = document.getElementById('grid');
      const tiles = Array.from(grid.children);
      
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        grid.appendChild(tiles[j]);
      }
    }

    function submitGuess() {
      const selected = Array.from(document.querySelectorAll('.tile.selected'))
        .map(t => t.dataset.word)
        .sort();
      
      // Check against each group
      for (const group of currentPuzzle.groups) {
        const groupWords = [...group.words].sort();
        
        if (JSON.stringify(selected) === JSON.stringify(groupWords)) {
          // Correct!
          solveGroup(group);
          return;
        }
      }
      
      // Wrong guess
      mistakes--;
      updateMistakesDisplay();
      
      // Shake animation
      const grid = document.getElementById('grid');
      grid.style.animation = 'shake 0.5s';
      setTimeout(() => grid.style.animation = '', 500);
      
      if (mistakes === 0) {
        gameOver();
      }
      
      deselectAll();
    }

    function solveGroup(group) {
      // Mark tiles as solved
      const tiles = document.querySelectorAll('.tile');
      tiles.forEach(tile => {
        if (group.words.includes(tile.dataset.word)) {
          tile.classList.add('solved', group.color);
          tile.classList.remove('selected');
        }
      });
      
      // Remove from available
      availableWords = availableWords.filter(w => !group.words.includes(w));
      
      // Add to solved groups display
      const solvedContainer = document.getElementById('solvedGroups');
      const solvedGroup = document.createElement('div');
      solvedGroup.className = 'solved-group ' + group.color;
      solvedGroup.innerHTML = `<div class="category">${group.category}</div><div class="words">${group.words.join(', ')}</div>`;
      solvedContainer.appendChild(solvedGroup);
      
      solvedGroups.push(group);
      
      // Check win
      if (solvedGroups.length === 4) {
        winGame();
      }
      
      deselectAll();
    }

    function updateMistakesDisplay() {
      const mistakesText = document.getElementById('mistakesLeft');
      const mistakesRow = document.getElementById('mistakesRow');
      
      mistakesText.textContent = mistakes;
      mistakesRow.innerHTML = '';
      
      for (let i = 0; i < 4; i++) {
        const x = document.createElement('span');
        x.className = 'x-mark';
        x.textContent = i < mistakes ? 'X' : '○';
        x.style.color = i < mistakes ? '#ef4444' : '#4b5563';
        mistakesRow.appendChild(x);
      }
    }

    function winGame() {
      // Update streak
      const today = new Date().toDateString();
      const lastPlayed = localStorage.getItem('wordChainLastPlayed');
      
      let streak = parseInt(localStorage.getItem('wordChainStreak') || '0');
      if (lastPlayed !== today) {
        streak++;
        localStorage.setItem('wordChainStreak', streak);
        localStorage.setItem('wordChainLastPlayed', today);
      }
      
      // Show results
      document.getElementById('resultTitle').textContent = 'You Win!';
      document.getElementById('resultEmoji').textContent = 'GGGG';
      document.getElementById('resultMessage').textContent = mistakes === 4 ? 'Perfect!' : mistakes + ' mistakes';
      document.getElementById('resultModal').classList.remove('hidden');
      
      // Show email modal after delay
      setTimeout(() => {
        const dismissed = localStorage.getItem('wordChainEmailDismissed');
        const dismissedTime = parseInt(localStorage.getItem('wordChainEmailDismissedTime') || '0');
        if (!dismissed || Date.now() - dismissedTime > 24*60*60*1000) {
          document.getElementById('emailModal').classList.remove('hidden');
        }
      }, 3000);
    }

    function gameOver() {
      document.getElementById('resultTitle').textContent = 'Game Over';
      document.getElementById('resultEmoji').textContent = 'RRRR';
      document.getElementById('resultMessage').textContent = 'Better luck tomorrow!';
      document.getElementById('resultModal').classList.remove('hidden');
    }

    function shareResult() {
      const emoji = mistakes === 4 ? 'GGGG' : 'YYYY';
      const text = 'Word Chain ' + new Date().toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ': ' + emoji + ' ' + mistakes + '/4';
      navigator.clipboard.writeText(text).then(() => {
        alert('Result copied!');
      });
    }

    function subscribeEmail() {
      const email = document.getElementById('emailInput').value;
      if (email) {
        const list = JSON.parse(localStorage.getItem('emailList') || '[]');
        list.push({email: email, date: new Date().toISOString()});
        localStorage.setItem('emailList', JSON.stringify(list));
        document.getElementById('emailModal').classList.add('hidden');
        alert('Subscribed!');
      }
    }

    function dismissEmail(hours) {
      localStorage.setItem('wordChainEmailDismissed', 'true');
      localStorage.setItem('wordChainEmailDismissedTime', Date.now().toString());
      document.getElementById('emailModal').classList.add('hidden');
    }

    // Premium
    document.getElementById('premiumBadge').onclick = function() {
      document.getElementById('premiumModal').classList.remove('hidden');
    };

    function closePremiumModal() {
      document.getElementById('premiumModal').classList.add('hidden');
    }

    function upgradePremium() {
      localStorage.setItem('isPremium', 'true');
      isPremium = true;
      document.getElementById('premiumBadge').classList.add('active');
      document.querySelectorAll('.ad-banner').forEach(ad => ad.classList.add('hidden'));
      closePremiumModal();
      alert('Welcome to Premium!');
    }

    init();
  </script>
</body>
</html>
