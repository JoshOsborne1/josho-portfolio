<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --bg-gradient: radial-gradient(circle at 50% -20%, #1a1c29 0%, #0a0b10 80%);
            --text-primary: #e0e2eb;
            --text-secondary: #8c92a6;
            --accent-blue: #00e5ff;
            --accent-blue-glow: rgba(0, 229, 255, 0.4);
            --accent-gold: #ffb300;
            --accent-gold-glow: rgba(255, 179, 0, 0.4);
            --target-4: #00e5ff;
            --target-3: #0099cc;
            --target-2: #005580;
            --panel-bg: rgba(20, 22, 32, 0.7);
            --panel-border: rgba(255, 255, 255, 0.05);
            --font-main: 'Space Grotesk', sans-serif;
            --transition-smooth: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Particles / Texture Background */
        .ambient-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Header / Scoreboard */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .team-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 1.5rem 2.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        .team-score.active-team {
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px var(--accent-gold-glow);
            transform: translateY(-5px);
        }

        .team-score.active-team.team-two {
            border-color: var(--accent-blue);
            box-shadow: 0 0 30px var(--accent-blue-glow);
        }

        .team-name {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Main Game Area */
        main {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }

        /* Word Pairs */
        .concept-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            position: absolute;
            top: 50%;
            transform: translateY(-150px);
            padding: 0 2rem;
            pointer-events: none;
        }

        .concept-label {
            font-size: 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            background: var(--panel-bg);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(5px);
            transition: opacity 0.4s ease;
        }

        .concept-left { transform: rotate(-5deg); }
        .concept-right { transform: rotate(5deg); }

        /* Dial Area */
        .dial-container {
            position: relative;
            width: 600px;
            height: 300px;
            margin-top: 4rem;
        }

        .dial-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel-bg);
            border-top-left-radius: 300px;
            border-top-right-radius: 300px;
            border: 2px solid var(--panel-border);
            border-bottom: none;
            overflow: hidden;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* SVG Target Zone */
        .target-zone-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: 50% 100%;
            transition: opacity 0.3s ease, filter 0.5s ease;
            opacity: 0;
        }

        .reveal-mode .target-zone-svg {
            opacity: 1;
            filter: drop-shadow(0 0 20px var(--target-4));
        }

        .psychic-sees-mode .target-zone-svg {
            opacity: 1;
        }

        /* Needle */
        .needle-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 280px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            z-index: 20;
            pointer-events: none;
        }

        .needle {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, transparent 10%, var(--accent-gold) 40%, #fff 100%);
            border-radius: 4px;
            box-shadow: 0 0 15px var(--accent-gold);
            position: relative;
        }

        .needle::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -6px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
        }

        .dial-hub {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: #2a2d3e;
            border-radius: 50%;
            border: 4px solid #1a1c29;
            z-index: 30;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Interaction Layer */
        .interaction-layer {
            position: absolute;
            top: -100px; left: -100px; right: -100px; bottom: 0;
            z-index: 40;
            cursor: grab;
            touch-action: none;
        }
        
        .interaction-layer:active {
            cursor: grabbing;
        }

        /* State UI & Controls */
        .controls-container {
            margin-top: 4rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
            width: 100%;
        }

        .state-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 1px;
            height: 30px;
        }

        .btn {
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 3rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent-gold);
            color: #000;
            border: none;
            box-shadow: 0 0 20px var(--accent-gold-glow);
        }

        .btn-primary:hover {
            background: #ffc133;
            box-shadow: 0 0 30px var(--accent-gold-glow);
        }

        .btn-blue {
            background: var(--accent-blue);
            color: #000;
            border: none;
            box-shadow: 0 0 20px var(--accent-blue-glow);
        }

        .btn-blue:hover {
            background: #33eaff;
            box-shadow: 0 0 30px var(--accent-blue-glow);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        /* Score Reveal Animation */
        .score-reveal {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 50px var(--accent-gold);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-reveal.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Utility classes */
        .hidden { display: none !important; }
        
        /* Media Queries */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            .team-score { padding: 1rem 1.5rem; }
            .score-value { font-size: 2.5rem; }
            .dial-container { width: 340px; height: 170px; }
            .needle-container { height: 150px; }
            .concept-label { font-size: 1.2rem; padding: 0.5rem 1rem; }
            .concept-container { transform: translateY(-100px); padding: 0 1rem; }
        }

    </style>
</head>
<body>
    <div class="ambient-texture"></div>

    <header>
        <div class="team-score active-team team-one" id="team1-board">
            <div class="team-name">Team Brain</div>
            <div class="score-value" id="score1">0</div>
        </div>
        <div class="team-score team-two" id="team2-board">
            <div class="team-name">Team Wave</div>
            <div class="score-value" id="score2">0</div>
        </div>
    </header>

    <main>
        <div class="concept-container">
            <div class="concept-label concept-left" id="concept-left">HOT</div>
            <div class="concept-label concept-right" id="concept-right">COLD</div>
        </div>

        <div class="dial-container" id="dial-wrapper">
            <div class="dial-bg"></div>
            
            <svg class="target-zone-svg" id="target-svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMax meet">
                <defs>
                    <clipPath id="dial-clip">
                        <path d="M 0 300 A 300 300 0 0 1 600 300 L 0 300 Z" />
                    </clipPath>
                </defs>
                <g clip-path="url(#dial-clip)" id="target-bands">
                    <!-- Target bands drawn dynamically by JS -->
                </g>
            </svg>

            <div class="needle-container" id="needle">
                <div class="needle"></div>
            </div>
            
            <div class="dial-hub"></div>
            
            <div class="interaction-layer" id="interaction-layer"></div>
        </div>

        <div class="score-reveal" id="score-reveal">+4</div>

        <div class="controls-container">
            <div class="state-message" id="state-message">Psychic: Review the word pair.</div>
            
            <!-- Dynamic Buttons -->
            <button class="btn btn-primary" id="btn-ready">I'm Ready (Show Target)</button>
            <button class="btn hidden" id="btn-clue-given">Clue Given</button>
            <button class="btn btn-primary hidden" id="btn-reveal">Reveal Target</button>
            
            <div class="btn-group hidden" id="btn-group-opponent">
                <button class="btn" id="btn-guess-left">Target is Left</button>
                <button class="btn" id="btn-guess-right">Target is Right</button>
            </div>
            
            <button class="btn hidden" id="btn-next">Next Round</button>
        </div>
    </main>

    <script>
        /**
         * Wavelength Game Logic
         * State Machine, Physics Engine, and Rendering
         */

        // --- Data ---
        const WORD_PAIRS = [
            ["Hot", "Cold"], ["Famous", "Unknown"], ["Fast", "Slow"], ["Big", "Small"], 
            ["Old", "Young"], ["Loud", "Quiet"], ["Clean", "Dirty"], ["Smart", "Dumb"], 
            ["Happy", "Sad"], ["Easy", "Hard"], ["Rare", "Common"], ["Beautiful", "Ugly"], 
            ["Strong", "Weak"], ["Light", "Dark"], ["Cheap", "Expensive"], ["Safe", "Dangerous"], 
            ["Funny", "Serious"], ["Natural", "Artificial"], ["Simple", "Complex"], 
            ["Healthy", "Unhealthy"], ["Popular", "Obscure"], ["Modern", "Ancient"], 
            ["Literal", "Metaphorical"], ["Physical", "Digital"], ["Public", "Private"], 
            ["Violent", "Peaceful"], ["Creative", "Analytical"], ["Emotional", "Logical"], 
            ["Urban", "Rural"], ["Formal", "Casual"], ["Good", "Evil"], ["Art", "Trash"]
        ];

        // --- State ---
        const STATES = {
            SETUP: 'SETUP',
            PSYCHIC_SEES: 'PSYCHIC_SEES',
            PSYCHIC_CLUES: 'PSYCHIC_CLUES',
            TEAM_GUESSES: 'TEAM_GUESSES',
            REVEAL: 'REVEAL',
            OPPONENT_LEFT_RIGHT: 'OPPONENT_LEFT_RIGHT',
            NEXT_ROUND: 'NEXT_ROUND'
        };

        let currentState = STATES.SETUP;
        let currentTeam = 1; // 1 or 2
        let scores = { 1: 0, 2: 0 };
        
        // Target Logic (-90 to 90 degrees)
        let targetAngle = 0; 
        const TARGET_WIDTH = 40; // Total width in degrees
        let roundScore = 0;

        // Physics State
        let currentNeedleAngle = 0; // -90 to 90
        let targetNeedleAngle = 0;
        let velocity = 0;
        let isDragging = false;
        let lastTimestamp = 0;

        // --- DOM Elements ---
        const elNeedle = document.getElementById('needle');
        const elInteraction = document.getElementById('interaction-layer');
        const elTargetSvg = document.getElementById('target-svg');
        const elTargetBands = document.getElementById('target-bands');
        const elDialWrapper = document.getElementById('dial-wrapper');
        
        const elConceptLeft = document.getElementById('concept-left');
        const elConceptRight = document.getElementById('concept-right');
        
        const elStateMessage = document.getElementById('state-message');
        const elBtnReady = document.getElementById('btn-ready');
        const elBtnClueGiven = document.getElementById('btn-clue-given');
        const elBtnReveal = document.getElementById('btn-reveal');
        const elBtnGroupOpponent = document.getElementById('btn-group-opponent');
        const elBtnGuessLeft = document.getElementById('btn-guess-left');
        const elBtnGuessRight = document.getElementById('btn-guess-right');
        const elBtnNext = document.getElementById('btn-next');
        
        const elScore1 = document.getElementById('score1');
        const elScore2 = document.getElementById('score2');
        const elTeam1Board = document.getElementById('team1-board');
        const elTeam2Board = document.getElementById('team2-board');
        const elScoreReveal = document.getElementById('score-reveal');

        // --- Initialization ---
        function init() {
            setupEventListeners();
            startNewRound();
            requestAnimationFrame(physicsLoop);
        }

        function startNewRound() {
            // Pick random words
            const pair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
            // 50% chance to swap left/right
            if (Math.random() > 0.5) {
                elConceptLeft.textContent = pair[1];
                elConceptRight.textContent = pair[0];
            } else {
                elConceptLeft.textContent = pair[0];
                elConceptRight.textContent = pair[1];
            }

            // Generate target angle (-75 to 75 to keep it fully visible)
            targetAngle = (Math.random() * 150) - 75;
            drawTargetSVG();

            // Reset UI
            elDialWrapper.className = 'dial-container';
            elScoreReveal.className = 'score-reveal';
            
            // Randomize starting needle position
            currentNeedleAngle = (Math.random() * 160) - 80;
            targetNeedleAngle = currentNeedleAngle;
            velocity = 0;

            updateActiveTeamUI();
            setState(STATES.SETUP);
        }

        // --- SVG Drawing ---
        function drawTargetSVG() {
            // Convert angle (-90 to 90) to SVG coordinates (0 to 180 degrees, where 0 is left, 180 is right)
            // But standard SVG arc drawing uses coordinates. It's easier to rotate a group.
            
            elTargetBands.innerHTML = '';
            
            // Draw bands: center (4), mid (3), outer (2)
            const cx = 300, cy = 300, r = 300;
            
            // Base rotation: targetAngle is -90 (left) to 90 (right).
            // We want to draw a wedge centered at top (0), then rotate the whole group.
            const halfW = TARGET_WIDTH / 2;
            
            // 2 Points (Outer)
            const p2Left = polarToCartesian(cx, cy, r, -halfW);
            const p2Right = polarToCartesian(cx, cy, r, halfW);
            const path2 = `<path d="M ${cx} ${cy} L ${p2Left.x} ${p2Left.y} A ${r} ${r} 0 0 1 ${p2Right.x} ${p2Right.y} Z" fill="var(--target-2)" />`;
            
            // 3 Points (Mid)
            const w3 = TARGET_WIDTH * 0.6;
            const halfW3 = w3 / 2;
            const p3Left = polarToCartesian(cx, cy, r, -halfW3);
            const p3Right = polarToCartesian(cx, cy, r, halfW3);
            const path3 = `<path d="M ${cx} ${cy} L ${p3Left.x} ${p3Left.y} A ${r} ${r} 0 0 1 ${p3Right.x} ${p3Right.y} Z" fill="var(--target-3)" />`;
            
            // 4 Points (Center)
            const w4 = TARGET_WIDTH * 0.2;
            const halfW4 = w4 / 2;
            const p4Left = polarToCartesian(cx, cy, r, -halfW4);
            const p4Right = polarToCartesian(cx, cy, r, halfW4);
            const path4 = `<path d="M ${cx} ${cy} L ${p4Left.x} ${p4Left.y} A ${r} ${r} 0 0 1 ${p4Right.x} ${p4Right.y} Z" fill="var(--target-4)" />`;

            // SVG math: 0 degrees is standard right. We want 0 to be UP. 
            // Our polarToCartesian function treats 0 as UP.
            
            elTargetBands.innerHTML = path2 + path3 + path4;
            elTargetBands.setAttribute('transform', `rotate(${targetAngle} 300 300)`);
        }

        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            // Make 0 degrees point UP
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        // --- Physics Engine ---
        function updatePointer(e) {
            if (!isDragging || currentState !== STATES.TEAM_GUESSES) return;

            const rect = elDialWrapper.getBoundingClientRect();
            // Origin is bottom center of the dial
            const originX = rect.left + rect.width / 2;
            const originY = rect.bottom;

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const dx = clientX - originX;
            const dy = clientY - originY;
            
            // Calculate angle: Math.atan2 gives angle from X axis. We want 0 at top.
            let rad = Math.atan2(dy, dx);
            let deg = rad * (180 / Math.PI);
            
            // Adjust so straight up is 0, right is positive, left is negative
            deg = deg + 90;
            
            // Clamp between -90 and 90
            if (deg < -90) deg = -90;
            if (deg > 90) deg = 90;

            targetNeedleAngle = deg;
        }

        function physicsLoop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            if (isDragging && currentState === STATES.TEAM_GUESSES) {
                // Instantly follow pointer when dragging, but record velocity
                const oldAngle = currentNeedleAngle;
                // Add some interpolation for smoothness even when dragging
                currentNeedleAngle += (targetNeedleAngle - currentNeedleAngle) * 0.4;
                velocity = (currentNeedleAngle - oldAngle) / Math.max(dt, 1);
            } else {
                // Apply inertia and friction
                currentNeedleAngle += velocity * dt;
                velocity *= 0.92; // Friction

                // Bounce off edges
                if (currentNeedleAngle < -90) {
                    currentNeedleAngle = -90;
                    velocity *= -0.5;
                }
                if (currentNeedleAngle > 90) {
                    currentNeedleAngle = 90;
                    velocity *= -0.5;
                }
                
                targetNeedleAngle = currentNeedleAngle;
            }

            // Render needle
            elNeedle.style.transform = `translateX(-50%) rotate(${currentNeedleAngle}deg)`;

            requestAnimationFrame(physicsLoop);
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            // Dial Interaction
            const startDrag = (e) => {
                if (currentState !== STATES.TEAM_GUESSES) return;
                isDragging = true;
                updatePointer(e);
            };
            const stopDrag = () => { isDragging = false; };

            elInteraction.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', updatePointer);
            window.addEventListener('mouseup', stopDrag);

            elInteraction.addEventListener('touchstart', startDrag, {passive: true});
            window.addEventListener('touchmove', updatePointer, {passive: false});
            window.addEventListener('touchend', stopDrag);

            // Button actions
            elBtnReady.addEventListener('click', () => setState(STATES.PSYCHIC_SEES));
            elBtnClueGiven.addEventListener('click', () => setState(STATES.TEAM_GUESSES));
            elBtnReveal.addEventListener('click', () => setState(STATES.REVEAL));
            
            elBtnGuessLeft.addEventListener('click', () => handleOpponentGuess('LEFT'));
            elBtnGuessRight.addEventListener('click', () => handleOpponentGuess('RIGHT'));
            
            elBtnNext.addEventListener('click', () => {
                currentTeam = currentTeam === 1 ? 2 : 1;
                startNewRound();
            });
        }

        // --- State Machine ---
        function setState(newState) {
            currentState = newState;
            
            // Hide all controls first
            elBtnReady.classList.add('hidden');
            elBtnClueGiven.classList.add('hidden');
            elBtnReveal.classList.add('hidden');
            elBtnGroupOpponent.classList.add('hidden');
            elBtnNext.classList.add('hidden');

            switch (newState) {
                case STATES.SETUP:
                    elStateMessage.textContent = `Psychic for Team ${currentTeam}: Review the concepts.`;
                    elBtnReady.classList.remove('hidden');
                    break;
                
                case STATES.PSYCHIC_SEES:
                    elDialWrapper.classList.add('psychic-sees-mode');
                    elStateMessage.textContent = "Memorize the target zone. Hiding in 3...";
                    
                    let count = 3;
                    const interval = setInterval(() => {
                        count--;
                        if (count > 0) {
                            elStateMessage.textContent = `Memorize the target zone. Hiding in ${count}...`;
                        } else {
                            clearInterval(interval);
                            elDialWrapper.classList.remove('psychic-sees-mode');
                            setState(STATES.PSYCHIC_CLUES);
                        }
                    }, 1000);
                    break;
                
                case STATES.PSYCHIC_CLUES:
                    elStateMessage.textContent = "Give ONE word clue to your team.";
                    elBtnClueGiven.classList.remove('hidden');
                    break;
                
                case STATES.TEAM_GUESSES:
                    elStateMessage.textContent = "Team discusses and turns the dial to guess.";
                    elBtnReveal.classList.remove('hidden');
                    // Add subtle pulse to needle to indicate interactivity
                    elNeedle.querySelector('.needle').style.boxShadow = `0 0 30px var(--accent-gold)`;
                    break;
                
                case STATES.REVEAL:
                    elNeedle.querySelector('.needle').style.boxShadow = `0 0 15px var(--accent-gold)`;
                    elDialWrapper.classList.add('reveal-mode');
                    calculateScore();
                    
                    if (roundScore === 4) {
                        elStateMessage.textContent = "BULLSEYE! Perfect score.";
                        showScoreAnim(`+4`);
                        // Skip opponent guess on bullseye
                        setTimeout(() => setState(STATES.NEXT_ROUND), 3000);
                    } else {
                        showScoreAnim(`+${roundScore}`);
                        if (roundScore > 0) {
                            elStateMessage.textContent = `Good job! Scored ${roundScore} points.`;
                        } else {
                            elStateMessage.textContent = "Missed the zone completely.";
                        }
                        // Move to opponent left/right guess
                        setTimeout(() => setState(STATES.OPPONENT_LEFT_RIGHT), 2500);
                    }
                    break;
                
                case STATES.OPPONENT_LEFT_RIGHT:
                    const oppTeam = currentTeam === 1 ? 2 : 1;
                    elStateMessage.textContent = `Team ${oppTeam}: Is the true center LEFT or RIGHT of the needle?`;
                    elBtnGroupOpponent.classList.remove('hidden');
                    break;
                
                case STATES.NEXT_ROUND:
                    elStateMessage.textContent = "Round complete.";
                    elBtnNext.classList.remove('hidden');
                    break;
            }
        }

        // --- Game Logic ---
        function calculateScore() {
            const diff = Math.abs(currentNeedleAngle - targetAngle);
            const halfW = TARGET_WIDTH / 2;
            
            if (diff <= halfW * 0.2) roundScore = 4;
            else if (diff <= halfW * 0.6) roundScore = 3;
            else if (diff <= halfW) roundScore = 2;
            else roundScore = 0;

            scores[currentTeam] += roundScore;
            updateScoreUI();
        }

        function handleOpponentGuess(guess) {
            const oppTeam = currentTeam === 1 ? 2 : 1;
            const targetIsRight = targetAngle > currentNeedleAngle;
            
            let correct = false;
            if (guess === 'RIGHT' && targetIsRight) correct = true;
            if (guess === 'LEFT' && !targetIsRight) correct = true;
            
            if (correct) {
                scores[oppTeam] += 1;
                elStateMessage.textContent = `Correct! Team ${oppTeam} steals 1 point.`;
                showScoreAnim('+1');
            } else {
                elStateMessage.textContent = `Incorrect! No steal.`;
            }
            
            updateScoreUI();
            
            // Small delay before allowing next round
            elBtnGroupOpponent.classList.add('hidden');
            setTimeout(() => setState(STATES.NEXT_ROUND), 2000);
        }

        function updateScoreUI() {
            elScore1.textContent = scores[1];
            elScore2.textContent = scores[2];
        }

        function updateActiveTeamUI() {
            if (currentTeam === 1) {
                elTeam1Board.classList.add('active-team');
                elTeam2Board.classList.remove('active-team');
                elBtnReady.className = 'btn btn-primary';
                elBtnReveal.className = 'btn btn-primary';
            } else {
                elTeam2Board.classList.add('active-team');
                elTeam1Board.classList.remove('active-team');
                elBtnReady.className = 'btn btn-blue';
                elBtnReveal.className = 'btn btn-blue';
            }
        }

        function showScoreAnim(text) {
            elScoreReveal.textContent = text;
            elScoreReveal.classList.add('show');
            setTimeout(() => {
                elScoreReveal.classList.remove('show');
            }, 2000);
        }

        // Start everything
        init();

    </script>
</body>
</html>
